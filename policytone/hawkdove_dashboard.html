n persistence as greater threat than US despite weaker demand, with elevated wage growth (6-7%) and sticky services inflation requiring continued vigilance; recent wage data surprised downside and services inflation peaked, supporting her recent vote to hold rates steady rather than hike, indicating cautiously hawkish but moderating stance focused on 'last mile' inflation challenge.", "st": 0.35}, {"sp": "Sarah Breeden", "rs": "Speaker signals cautious pivot from tightening bias toward hold-and-monitor stance: inflation trending favorably with downside surprises, but services inflation still elevated (6%+) and wage growth (6-7%) remains above target-consistent levels; demand has weakened more than previously thought with most monetary transmission already complete; policy language shifts from 'need to tighten' to 'how long to remain restrictive,' indicating a pause rather than cuts, but confidence in disinflationary trend is building with caveats on wage persistence through April wage-setting season.", "st": 0.05}, {"sp": "Swati Dhingra", "rs": "Dhingra advocates for rate cuts citing broad-based disinflation (CPI 10%→4%), leading producer price indicators pointing lower, weak demand outlook, concentrated wage pressures already moderating, and significant overtightening risks to living standards—positioning clearly on the accommodative side while acknowledging inflation remains above target but on a firmly downward path.", "st": -1.25}, {"sp": "Jonathan Haskel", "rs": "연설은 과거 인플레 원인 분석과 임금·물가 전망을 다루나, 현재의 통화정책 스탠스(인상/인하)를 직접 표명하지 않아 정책 방향성이 모호하며, 정책위원 임기 종료(2024)로 현 입장이 불명확함.", "st": 0.15}, {"sp": "Huw Pill", "rs": "Speech is primarily theoretical/strategic discussion of monetary policy framework design rather than assessment of current inflation risks or near-term policy stance; inflation concern slightly elevated by reference to recent 'elevated inflation and inflation risk' but no current hawkish signals present; growth/labor completely absent; policy_path neutral out financial stability architecture and crisis prevention mechanisms, not about monetary policy stance on inflation, growth, or rate path. The speaker (Bank of England Governor) discusses theoretical frameworks, surveillance tools, and emergency liquidity facilities for non-banks, but makes no direct statements about inflation risks, labor market conditions, or interest rate direction. The discussion of 'growth and competition' is purely contextual—not a policy signal. Confidence is very low because this is not a monetary policy-focused communication and provides no clear signals on the three policy axes.", "st": 0.0}, {"sp": "(unknown)", "rs": "This speech is a memorial tribute to Mike Gill focused on clearing houses, financial regulation, and international cooperation—it contains no discussion of monetary policy, interest rates, inflation expectations, labor markets, or policy rate trajectories, making it non-responsive to monetary policy analysis.", "st": 0.0}, {"sp": "Huw Pill", "rs": "Speaker emphasizes price stability as paramount and expresses concern about services inflation persistence and potential underestimation of policy accommodation (dissented from August cut), suggesting cautious stance toward further easing despite headline inflation at target, though acknowledging inflation has fallen substantially without major economic disruption.", "st": 0.8}, {"sp": "David Bailey", "rs": "Speech is entirely about prudential banking regulation and capital framework reform for small deposit takers; contains no discussion of monetary policy, interest rates, inflation expectations, labor market conditions, or policy rate trajectory—the core domains of central bank monetary stance analysis.", "st": 0.1}, {"sp": "Sarah Breeden", "rs": "이 연설은 금융안정과 거시건전성 정책에 전적으로 초점을 맞추고 있으며, 통화정책(인플레이션, 금리인상/인하)에 대한 직접적 언급이 거의 없으므로 세 축 모두 중립(0)으로 평가되며, 통화정책과의 관련성이 극히 제한적이어서 신뢰도가 매우 낮습니다.", "st": 0.0}], "2026-06-16": [{"sp": "Dave Ramsden", "rs": "본 연설은 금융안정성, 비은행금융기관(NBFI), 유동성 위험에 집중하며 통화정책 방향성(금리 인상/인하)에 대한 직접적 언급이 거의 없어 매파·완화 신호를 판단하기 어렵고, 물가·성장·노동시장에 대한 구체적 평가도 부재하다.", "st": 0.0}], "2026-05-21": [{"sp": "Sarah Breeden", "rs": "이 연설은 AI가 금융안정성에 미치는 영향에 관한 금융감독 이슈를 다루며, 통화정책(금리인상/인하, 인플레이션 대응, 성장·고용 관리)과는 직접적 관련이 거의 없으므로 세 축 모두 중립(0)으로 평가하고 신뢰도는 매우 낮음.", "st": 0.0}], "2024-01-01": [{"sp": "Dave Ramsden", "rs": "The provided text appears to be corrupted or encoded binary data that cannot be parsed as a coherent central bank speech. Without readable content discussing monetary policy, inflation, growth, labor, or policy direction, no substantive analysis is possible.", "st": 0.0}, {"sp": "Megan Greene", "rs": "The provided speech text appears to be corrupted or improperly encoded binary data with no intelligible central bank policy content, making meaningful assessment of inflation concerns, labor market views, or policy direction impossible.", "st": 0.0}], "2026-06-25": [{"sp": "Dave Ramsden", "rs": "This speech concerns payments infrastructure, financial market digitalisation, and technical innovation in wholesale settlement—topics entirely outside the scope of monetary policy stance, inflation management, or interest rate decisions. No discussion of interest rates, inflation targets, labour market conditions, or policy normalisation occurs; the speaker addresses financial technology and market structure only.", "st": 0.0}, {"sp": "Catherine L. Mann", "rs": "스피치는 인플레 구조적 상승성(기대-임금-물가 악순환, 비대칭 가격책정)과 약한 성장이라는 딜레마를 강조하며, 불확실성 속 공격적 긴축이 적절하다고 결론짓는 매파적 입장을 명확히 드러냈음.", "st": 1.0}, {"sp": "Andrew Bailey", "rs": "The speech focuses almost entirely on financial stability, market structure, and regulatory tools rather than monetary policy, inflation, or growth/labor outcomes; no direct signals on interest rate path, inflation concerns, or employment conditions are present.", "st": 0.0}, {"sp": "Catherine L. Mann", "rs": "MPC member voted for 50bp cut citing weak activity, moderating pricing power, and non-linear labor market softening, yet emphasized es forward-looking medium-term risks via upward output gap revisions (suggesting +0.3-0.4pp inflation impact) and labour market second-round effects, while noting monetary policy remains restrictive but near end of tightening cycle; growth showing clear slowdown signals, creating mixed signals between residual inflation concerns and emerging demand weakness.", "st": 0.05}, {"sp": "Alan Taylor", "rs": "이 연설은 중앙은행의 통화정책 커뮤니케이션 방법론(특히 중립금리 공시)에 관한 학술적 논의로, 현재 인플레이션 우려, 성장·고용 상황, 금리 인상/인하 방향성에 대한 직접적인 입장 표명이 거의 없으며, 통화정책 스탠스를 판단할 명확한 신호(매파/완화 표현)가 부재하다.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "이 연설은 통화정책 스탠스를 직접 다루지 않고, 역사적 관점에서 기축통화의 개념 변화를 설명하는 순수 학술·제도적 고찰로 인플레, 성장, 정책 방향성에 대한 명확한 신호가 전혀 없음.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "Bailey signals cautious gradual rate cuts (restrictive stance maintained, careful approach to restraint withdrawal) while acknowledging inflation pressures from energy and food prices creating near-term uncertainty; labour market loosening and moderate growth support continued disinflation, but elevated services inflation and wage persistence warrant continued vigilance—a balanced, slightly hawkish-leaning neutral stance reflecting data-dependent flexibility rather than clear easing or tightening bias.", "st": 0.05}, {"sp": "Andrew Bailey", "rs": "Speech is a historical lecture on 1925 gold standard return with no direct current monetary policy stance, inflation concerns, growth assessment, or policy path signaling for present economic conditions—purely academic retrospective analysis lacking forward guidance on rates or accommodation.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "This is a philosophical and institutional address on central banking theory, monetary/financial stability objectives, and money forms (crypto, digital currency, stablecoins), with minimal direct commentary on the current monetary policy stance, inflation risks, labor market conditions, or near-term policy path decisions; the speaker emphasizes Ukraine's co ademic rather than direct policy guidance, limiting confidence to 0.35.", "st": 0.05}, {"sp": "Swati Dhingra", "rs": "Speech is primarily research-focused diagnostic of past forecast errors and structural economic puzzles rather than forward monetary policy guidance; weak consumption and income data suggest downside pressures, but no explicit policy stance signals—moderate dovish tilt from acknowledging forecasting failures and demand weakness, offset by discussion of global supply factors and inflation measurement challenges that could justify restraint.", "st": -0.2}, {"sp": "Alan Taylor", "rs": "연설은 무역정책과 무역전환(trade diversion)의 거시경제적 파급효과를 이론과 역사적 사례로 설명하되, 통화정책 함의는 제한적으로 다룸. 인플레이션 측면에서는 관세가 '근기적으로 인플레이션적'이고 제3국에는 '디스인플레이션적'일 가능성을 명시하며, 영국에 상당한 물가 영향을 미칠 수 있음을 강조했으나 구체적인 인상·인하 신호는 명확하지 않음. 성장·고용에 대한 언급은 거의 없고, 정책경로(policy_path)는 'MPC 물가안정 위임' 강조로 약한 매파 톤을 보이나 현재 통화정책 스탠스를 직접 표현하지 않아 약한 신호에 그침. 신학적·역사적 깊이는 높으나 명확한 정책 의도는 모호함.", "st": 0.55}, {"sp": "Andrew Bailey", "rs": "연설은 금융안정과 규제를 주제로 하며 통화정책(금리, 인플레이션, 성장)에 대한 직접적 언급이 거의 없고, 거시경제 둔화(생산성 정체, GDP 성장 부진)를 언급하나 통화정책 스탠스는 불명확하여 신뢰도가 매우 낮음.", "st": -0.2}, {"sp": "Andrew Bailey", "rs": "이 연설은 통화정책과 무관하게 장기 성장·투자·생산성 발전에 초점을 맞춘 정책 레터로, 금리·인플레·경제 과열에 대한 직접적 신호가 전혀 없으며 현재 통화정책 스탠스를 드러내지 않아 세 축 모두 중립(0)입니다.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "The speech is fundamentally a supply-side economic history lecture with minimal direct monetary policy signaling. While acknowledging lower potential growth and structural headwinds (ageing, productivity, tariffs), the Governor frames these as long-run secular challenges requiring investment and innovation rather than immediate monetary tightening or easing. No explicit inflation or policy rate guidance is provided; the tone is analytical rather than hawkish or dovish, making confidence low and axes near-neutral, with only growth_labor slightly negative due to acknowledged structural drag on potential output.", "st": -0.2}, {"sp": "Huw Pill", "rs": "Speech signals cautious n policy pace via process discipline, but inflation/growth considerations are notably absent from the monetary policy stance discussion.", "st": 0.25}, {"sp": "Megan Greene", "rs": "Greene emphasizes that traditional 'look through' guidance for supply shocks is timeworn given successive pandemic and Ukraine shocks; she highlights persistent inflationary transmission via tight labor markets and second-round effects, signaling concern about future supply shock frequency—moderately hawkish on inflation risks and policy vigilance, neutral on growth given focus on supply dynamics rather than demand/labor softening.", "st": 0.95}, {"sp": "Sarah Breeden", "rs": "This speech focuses entirely on financial infrastructure, payment systems modernisation, and digital currency design with no discussion of monetary policy stance, inflation concerns, employment dynamics, or interest rate direction—rendering it outside the scope of monetary policy analysis despite addressing central bank operations.", "st": 0.0}, {"sp": "Sarah Breeden", "rs": "Speaker acknowledges current 4% inflation is 'too high' and unlikely to generate additional second-round effects given loose labour market and weak demand, but expresses caution about services inflation persistence and structural pricing changes; characterizes past policy as restrictive and still working but signals no imminent major tightening or easing, balancing dual risks of sticky inflation versus weak demand.", "st": 0.05}, {"sp": "Alan Taylor", "rs": "이 연설은 거시경제정책과 경제사의 관계에 관한 학술적 강연으로, 현재의 구체적인 통화정책 스탠스나 금리 방향, 인플레이션·성장 전망에 대한 직접적 언급이 없으며 역사적 사례와 방법론 논의에 중심을 두고 있어 통화정책 입장을 판단하기 위한 신호가 거의 없다.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "This is a theoretical lecture on central bank independence and institutional design rather than a policy statement; it contains no forward guidance, inflation assessment, growth outlook, or monetary policy stance signals that would warrant directional scoring on any axis.", "st": 0.0}, {"sp": "David Bail modative) policy if domestic conditions warrant, with moderately cautious tone on inflation from external shocks but no strong hawkish urgency signaled.", "st": -0.45}, {"sp": "Alan Taylor", "rs": "Taylor acknowledges past excessive restrictive policy stance driven by distorted conditioning assumptions (risk premia in OIS curve) rather than true MPC judgment, with persistent downward inflation forecast errors and unexplained demand shocks, yet stops short of signaling immediate easing—suggesting a pause for framework recalibration rather than hawkish tightening or dovish accommodation, hence mixed signals with modest dovish lean but guarded tone reflecting institutional uncertainty.", "st": -0.75}, {"sp": "Megan Greene", "rs": "연설은 에너지 충격으로 인한 인플레 상방 우려와 임금·가격 파급 채널을 강조하며 긴축적 기조를 암시하나, 직접적인 정책 신호가 명확하지 않고 전략 검토 단계로 보여 중도적 매파 톤이지만 정책 입장이 모호함.", "st": 0.55}, {"sp": "Alan Taylor", "rs": "Taylor acknowledges acute energy shocks (Persian Gulf) threatening inflation upside while acknowledging growth damage; emphasizes price stability mandate and credibility anchoring to prevent wage-price spirals, signaling vigilance against inflation propagation rather than immediate easing, but avoids explicit hawkish language on tightening path given uncertain shock dimensions and two-sided risks.", "st": 0.85}, {"sp": "Huw Pill", "rs": "연설은 물가안정(2% 목표) 추구와 인플레 압력에 대응할 준비를 강조하며 매파적 톤을 드러내지만, 구체적 정책 조치나 방향성이 모호하고 시나리오 분석·불확실성 논의에 무게를 두어 직접적 통화정책 신호는 제한적임.", "st": 0.55}, {"sp": "Alan Taylor", "rs": "The speaker emphasizes forward-looking flexibility and output-stabilization trade-offs rather than aggressive disinflation, with acknowledgment that perfect foresight would not justify tighter policy despite inflation deviations—suggesting a balanced, cautious stance that leans slightly dovish on growth-labor concerns while maintaining nominal inflation target credibility without hawkish urgency.", "st": -0.2}, {"sp": "Andrew Bailey", "rs": "Governor Bailey's speech is primarily a long-form economic history and growth theory discussion centered on AI's potential as a GPT, with minimal direct monetary policy content; he makes no explicit statements on inflation risks, policy stance, or labor market tightness that would signal hawkish or dovish monetary positioning—the modest negative growth_labor score reflects cautionary language on employment disruption from technology, while inflation and policy_path remain neutral due to complete absence of central bank rate or price-stability signaling.", "st": -0.2}, {"sp": "Andrew Bailey", "rs": "BoE acknowledges upside inflation pressure from Middle East energy shock (+1.0) but deliberately 'looks through' direct effects while remaining vigilant on second-round wage/price spirals; simultaneously signals labour market softening and economic weakness (-1.0); policy stance is cautiously hawkish (holding rather than cutting, +0.5) but explicitly tolerating temporarily above-target inflation to support weak real economy, with state-contingent flexibility to tighten if second-round effects emerge—a balanced but inflation-conscious approach.", "st": 0.35}, {"sp": "Catherine L. Mann", "rs": "Speech focuses on UK's structural external imbalances and energy-driven cost-push inflation pressures (pushing inflation axis up), while acknowledging weak growth and rising unemployment that complicate policy response; the speaker notes monetary policy cannot offset energy shocks but discusses monitoring gilt market changes and external vulnerabilities, suggesting cautious vigilance rather than clear hawkish tightening or easing bias—moderately hawkish on inflation concerns but constrained by growth headwinds.", "st": 0.6}, {"sp": "Sarah Breeden", "rs": "This speech is primarily about financial technology infrastructure, tokenisation, and payments modernisation in the UK, with no substantive discussion of monetary policy, inflation management, interest rate decisions, or labor market dynamics that would inform central bank policy stance.", "st": 0.0}], "2026-06-24": [{"sp": "Alan Taylor", "rs": "Taylor's speech is primarily a historical and theoretical discussion of the natural rate (r*) and long-run interest rate determinants, with minimal direct assessment of current inflation risks, labor market dynamics, or near-term policy direction; it lacks hawkish or dovish policy signals, focusing instead on analytical frameworks rather than immediate monetary policy stance.", "st": 0.0}, {"sp": "Andrew Bailey", "rs": "이 연설은 통화정책 결정의 배경이 되는 경제성장·생산성·노동공급의 구조적 문제를 설명하는 것이 주목적이며, 현재 인플레이션 우려나 정책 방향 변화(인상/인하)에 대한 직접적인 신호는 거의 없고, 오히려 중기 성장 동력(특히 노동공급) 약화를 진단하는 학술적 성격의 연설로 판단됨.", "st": -0.2}, {"sp": "Catherine L. Mann", "rs": "연설은 인플레이션 앵커 유지의 중요성을 강조하며, 최근 에너지 충격으로 인한 기대의 후향적 전환과 기대의 우상향 편향을 지적함으로써 이를 억제하기 위한 강한 통화정책 대응의 필요성을 암시하는 매파적 신호를 전달하고, 동시에 실업 증가를 통한 수요 조정의 가능성을 언급하여 성장·고용에 대한 완화 신호를 제시함.", "st": 0.7}], "2025-01-01": [{"sp": "Megan Greene", "rs": "The speech text is severely corrupted or encoded, making it impossible to identify any coherent monetary policy statements, inflation signals, labor market assessments, or rate path guidance. Cannot assess the central banker's stance.", "st": 0.0}]}}, "BOJ": {"label": "일본 (BOJ)", "dates": ["2024-02-08", "2024-02-29", "2024-03-05", "2024-03-07", "2024-03-27", "2024-04-18", "2024-04-19", "2024-05-08", "2024-05-27", "2024-05-29", "2024-06-06", "2024-08-07", "2024-08-28", "2024-09-05", "2024-09-11", "2024-09-12", "2024-09-24", "2024-10-03", "2024-10-16", "2024-11-14", "2024-11-18", "2024-12-05", "2024-12-25", "2025-01-14", "2025-01-30", "2025-02-06", "2025-02-19", "2025-03-05", "2025-04-17", "2025-05-16", "2025-05-22", "2025-05-27", "2025-06-03", "2025-06-07", "2025-06-25", "2025-07-03", "2025-07-23", "2025-08-23", "2025-08-28", "2025-09-02", "2025-09-29", "2025-10-03", "2025-10-16", "2025-10-20", "2025-11-10", "2025-11-27", "2025-12-01", "2025-12-25", "2026-02-13", "2026-02-26", "2026-03-02", "2026-03-03", "2026-05-16", "2026-05-27", "2026-06-03"], "bar": [ ative; inflation moderately rising from wage-driven factors with upside risks, but anchored near 2% target; growth-labor dynamics solid with tight labor market, rising wages, and positive corporate investment; however, tone balances tightening intent with careful monitoring of overseas risks and data-dependence, falling between strong and weak hawkishness.", "st": 0.85}], "2024-11-14": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "연설은 금융안정성과 팬데믹 대응 회고에 집중하며, 현재 통화정책 스탠스나 향후 정책 방향에 대한 직접적 신호가 거의 없음. 인플레·성장·고용·정책경로 모두 중립적이며, 통화정책 논의는 부수적 수준.", "st": 0.0}], "2024-10-16": [{"sp": "ADACHI Seiji, Member of the Policy Board", "rs": "스피커는 일본 경제가 회복력 있다고 평가하면서도 물가 상방 위험 증가로 7월 인상을 정당화했고, 향후 점진적 정상화 기조를 강조하되 기저 인플레 2% 달성 전까지 완화적 조건 유지 필수라고 강조하는 완화-중도적 입장을 보임.", "st": 0.65}], "2024-10-03": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "BOJ Board member Noguchi signals hawkish-leaning stance with emphasis on achieving 2% inflation sustainably through gradual policy rate adjustment and away from easing, yet acknowledges remaining uncertainties (underlying inflation not yet at 2%, expectations not anchored), resulting in moderately hawkish positioning with careful communication emphasis rather than urgent tightening urgency.", "st": 0.75}], "2024-09-24": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals gradual tightening with July rate hike and commitment to further increases if inflation continues rising toward 2%, but emphasizes data-dependency and caution given uncertainties; inflation concerns are moderate (wages driving services prices upward, import price pressures easing) and growth-labor dynamics are solid (labor shortages, strong corporate profits), though he stresses careful monitoring rather than a pre-set schedule.", "st": 1.15}], "2024-09-12": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "TAMURA signals a cautious hawkish stance: inflation risks are 'becoming more skewed to the upside' (labor shortages, wage pass-through, import prices), the July rate hike (+15bps) signals tightening intent, and he explicitly advocates raising rates to ~1% neutral by FY2026 to contain upside risks; however, growth remains moderate (+1% projected) and he emphasizes 'gradual' adjustment and careful communication, tempering a fully hawkish posture—hence +1.5 on policy_path (tightening bias but not aggressive), +1.0 on inflation (clear upside concern), and +0.5 on growth_labor (resilient but not overheating narrative).", "st": 1.15}], "2024-09-11": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "Nakagawa signals modest hawkishness: the BoJ raised the policy rate in July citing upside inflation risks and the need to adjust monetary accommodation toward the 2% target, yet maintains that real rates remain 'significantly negative' and accommodation continues—a measured tightening stance rather than aggressive restriction, consistent with growth expectations of 0.6-1.0% and acknowledgment of price pressures from wages and import costs.", "st": 0.9}], "2024-09-05": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "TAKATA signals a hawkish lean: explicitly notes 'upside risks to prices' requiring attention, judges further rate hike adjustment ('shift gears') appropriate if economic conditions hold, and emphasizes the Bank's recent shift away from easing—yet tempers urgency by stressing need for careful monitoring given global uncertainty and difficulty identifying natural rates, maintaining some accommodation for now.", "st": 0.9}], "2024-08-28": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor Himino presents a baseline scenario of inflation moderating to 2% with above-potential growth, emphasizing that Japan's accommodative stance has not caused runaway inflation due to structural factors; while discussing normalization of unconventional policies and gradual rate adjustments, the tone suggests policy patience rather than urgency to tighten, with significant focus on downside risks (inflation sinking below target) and continued support for the emerging wage-price cycle—leaning slightly hawkish on inflation outlook but dovish on policy path given the lengthy maintenance of accommodative conditions.", "st": 0.0}], "2024-08-07": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "중앙은행 부의장은 경제 회복과 임금-물가 악순환 우려 속에서 정책금리 인상(0.15%p)과 JGB 매입 감소를 결정했으나, 실질금리가 여전히 매우 낮고 구조적 노동부족으로 완화 기조를 유지하는 약한 매파 스탠스를 보임.", "st": 1.0}], "2024-06-06": [{"sp": "NAKAMURA Toyoaki, Member of the Policy Board", "rs": "Nakamura signals cautious hawkishness on inflation (persistent above 2%, rising wage expectations) but tempers it by noting pass-through remains incomplete and household consumption weakens; on growth-labor, expressed concern about falling below potential due to structural headwinds and noted consumption weakening despite high wage growth; on policy path, explicitly opposed further tightening at March meeting and advocates maintaining current accommodative stance pending spillover effects to SMEs, suggesting pause rather than additional hikes.", "st": -0.2}], "2024-05-29": [{"sp": "ADACHI Seiji, Member of the Policy Board", "rs": "Adachi signals hawkish inflation concerns (CPI reversal risk, wage pressures, yen depreciation effects) but maintains accommodative stance currently; policy framework shifted away from easing (YCC/NIRP ended) yet no rate hikes yet, reflecting cautious normalization rather than tightening; moderate growth backdrop with investment and wage momentum suggest stable but uncertain conditions.", "st": 0.65}], "2024-05-27": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor Uchida signals structural exit from deflation with labor market tightening and wage acceleration post-pandemic, supporting continued accommodative stance (QQE/YCC) while cautiously suggesting inflation may no longer be temporary; tone is moderately hawkish on inflation outlook but dovish-neutral on policy path given current structural demands remain unmet and deflationary norm still fragile.", "st": 0.75}, {"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals completion of QE/YCC unwinding in response to inflation improvement, but emphasizes cautious normalization and challenges in re-anchoring expectations, suggesting measured rather than aggressive tightening; inflation concerns are moderating but not dismissed, and growth/labor data receive minimal focus in this academic-framed speech.", "st": -0.1}], "2024-05-08": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals a decisive shift from accommodative to restrictive policy after confirming price stability is 'within sight' through stronger wage-price linkage and rising underlying inflation; inflation axis reflects confidence that second-component (wage-driven) inflation is solidifying toward 2% target; growth-labor axis positive given firm business sentiment, strong capex plans, and tight labor markets supporting continued expansion; policy_path notably hawkish with explicit rate hikes, YCC termination, and QE wind-down, though framed as normalization rather than further tightening.", "st": 1.25}], "2024-04-19": [{"sp": "UEDA Kazuo, Governor", "rs": "BOJ signals modest policy normalization (ending YCC, raising short-term rate to 0-0.1%) citing improved underlying inflation and strong wage growth, yet explicitly maintains accommodative stance ('easy financial environment' still needed), reflecting confidence in 2% inflation trajectory without premature tightening—a cautious hawkish pivot rather than aggressive restriction.", "st": 0.9}], "2024-04-18": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "연설은 일본이 디플레이션 탈출 초기 단계이며 임금-물가 선순환이 아직 초기라고 평가하면서, 장기적 정상화 경로를 지향하되 '다른 중앙은행보다 훨씬 느린 속도'의 정책금리 인상을 강조하고 있어 약한 매파 성향(inflation+1, policy_path+1)을 보임. 성장·고용에 대해서는 미국 견조, 중국 둔화, 일본 약세로 혼합 평가로 중립적(growth_labor:0). 통화정책 스탠스가 명확하나 '현단계 신중함'을 반복 강조해 순수 매파보다는 조건부 정상화 입장.", "st": 0.8}], "2024-03-27": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "TAMURA signals cautious monetary policy normalization: the BOJ raised the policy rate from -0.1-0% to around 0-0.1% and exited YCC, framing this as a 'first step' toward normalization rather than aggressive tightening. Inflation outlook shows disinflation path (2.8%→2.4%→1.8%), with core price momentum driven by wage-pass-through rather than overheating; labor market tight but growth moderating (1.8%→1.2%→1.0%). The tone is deliberately measured—emphasizing 'accommodative conditions will be maintained for the time being' and highlighting side effects of prolonged easing, not upside inflation risks or urgent need to tighten further, placing this in the weak-hawkish (early normalization) rather than strong-hawkish category.", "st": 0.75}], "2024-03-07": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "Nakagawa signals baseline monetary easing continuation targeting 2% sustainably amid moderating CPI (2.0% headline, 3.5% core), tight labor markets supporting wage growth, and economic recovery above potential, but acknowledges downside risks from overseas weakness and deflation risk, suggesting cautious patient stance rather than imminent tightening or easing adjustment.", "st": 0.1}], "2024-03-05": [{"sp": "UEDA Kazuo, Governor", "rs": "이 연설은 중앙은행 디지털화폐(CBDC) 기술 및 제도 설계에 관한 것으로, 통화정책의 방향성(인상/인하, 금리 경로), 인플레이션 전망, 성장·고용 상황에 대한 직접적인 언급이 전혀 없음. 순수 기술·정책 인프라 주제이므로 통화정책 스탠스 평가 대상이 아님.", "st": 0.0}], "2024-02-29": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "발화자는 2% 물가목표 달성이 가시화되고 있으며 장기 구조적 디플레이션 탈출의 변곡점이라고 평가하나, 동시에 완화기조의 부작용을 인식하고 QQE·YCC·마이너스금리 종료 및 정책 출구 검토를 명확히 제시하는 '온건한 매파' 입장으로, 해외 경기둔화 리스크와 기업·가계 물가임금설정 행동 변화 지속 여부 모니터링을 강조하며 즉각적 인상보다는 '점진적 정상화' 방향을 제시하고 있음.", "st": -0.1}], "2024-02-08": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor Uchida signals gradual policy normalization contingent on wage-price dynamics maturation, projecting inflation toward 2% through wage-driven mechanism rather than cost-push, while explicitly committing to maintain accommodative conditions post-normalization and emphasizing the outlook's rising likelihood—a cautious hawkish tone tempered by conditional language and emphasis on flexibility.", "st": 0.25}], "2025-12-25": [{"sp": "UEDA Kazuo, Governor", "rs": "BoJ Governor Ueda signals hawkish stance with recent rate hike (0.5→0.75%), clear confidence in wage-price mechanism approaching 2% target sustainably, and forward guidance of continued rate increases if baseline scenario holds; inflation concerns are moderately elevated (1.5) due to persistent upward price pressure and rising inflation expectations, labor market is solid/tight (1) supporting wage growth, and policy path is clearly restrictive (1.5) with explicit commitment to further tightening as economic conditions improve.", "st": 1.4}], "2025-12-01": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda signals hawkish stance: inflation at 3% with sticky food/wage-pass-through risks, tight labor market supporting sustained wage growth (5%+ target), and explicit commitment to gradual rate hikes as accommodation remains warranted; growth-labor moderately resilient but tariff risks slowly receding. Policy_path clearly positive (+1.0) given 'continue to raise' language and framing as 'easing accelerator,' not brakes; inflation concerns (+1.0) from persistent CPI levels and wage-price spiral risk despite near-term dips; growth_labor neutral-positive (+0.5) as economy recovers but faces modest near-term slowdown. High confidence due to direct, detailed monetary policy guidance and consistent hawkish tone throughout.", "st": 0.9}], "2025-11-27": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "NOGUCHI adopts a gradualist, data-dependent stance: acknowledging inflation persistence (2.7% forecast FY2025) from cost-push/supply factors rather than demand-pull, maintaining easing while signaling modest future rate hikes aligned with achieving the 2% target by H2 2026-2027, contingent on wage momentum spreading and external risks not worsening—neither hawkish urgency nor dovish commitment, but cautious normalization.", "st": 0.65}], "2025-11-10": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "BoJ maintains accommodative stance with 0.5% policy rate while gradually normalizing (reducing JGB purchases and selling ETFs), signaling modest future rate hikes if outlook materializes; inflation moderately elevated at 2.7% for FY2025 but expected to moderate, with acknowledged wage-price interaction risks; labor market remains tight and growth modest at 0.7% for FY2025-26, creating a gradualist, slightly hawkish-tilted tone rather than strong tightening urgency.", "st": 0.65}], "2025-10-20": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "Takata signals Japan has nearly achieved its 2% price stability target with inflation sustained above 2% due to domestic wage-price dynamics and labor shortage pressures; corporate profits remain robust despite tariff concerns; he emphasizes the 'planned suspension' downward revision should be lifted and price stability discussions should commence, suggesting the BOJ's accommodative posture may shift, though without explicit policy rate guidance—creating a moderately hawkish inflation view, neutral labor optimism, and cautious policy signaling.", "st": 0.9}], "2025-10-16": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Tamura advocates a hawkish tilt, warning of significant upside inflation risks (food, services, expectations), supporting a rate hike to 0.75% for risk management despite growth uncertainties from US tariffs; inflation is elevated at ~3%, wage-price interaction is operative, but growth remains moderate (0.5-0.7% forecast), creating a mixed but inflation-skewed policy stance.", "st": 1.3}], "2025-10-03": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals cautious accommodation amid global uncertainty: holding rates steady while acknowledging future tightening under baseline scenario, with inflation concerns moderated by temporary food factors but underlying CPI expected to reach 2% target; growth appears resilient but external headwinds (tariffs, US economy) create downside risks warranting continued monitoring rather than imminent policy shifts.", "st": 0.65}], "2025-09-29": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "BOJ Board member Noguchi signals moderate hawkish stance: inflation target sustainably achieved with successful rate hikes (July 2024, January 2025), tight labor market driving wage growth, upside price risks now outweighing downside global risks, necessitating 'careful assessment' for further adjustment; however, emphasis on gradual JGB reduction and balance sheet functioning preserves accommodative undertones, suggesting measured rather than aggressive tightening ahead.", "st": 1.4}], "2025-09-02": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor presents nuanced outlook: acknowledges elevated actual inflation (3.1%) but emphasizes underlying inflation still below 2% and approaching target; warns of growth moderation from tariff effects but notes resilience so far; discusses labor shortage structural pressures on inflation; overall tone is balanced with slight downside growth concern and modest acknowledgment of inflation persistence, but no urgent tightening signal—rather patient monitoring amid uncertainty.", "st": -0.1}], "2025-08-28": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "Nakagawa signals cautious optimism on growth and labor with sustained wage gains (5.3%), yet acknowledges inflation remains elevated (2.7% CPI ex-fresh food FY2025) with upward revision and rising medium-term expectations, while policy path leans slightly hawkish given persistent price pressures offsetting temporary tariff-induced slowdown—confidence moderate due to competing signals (strong labor vs. trade uncertainty) and absence of explicit forward guidance on rate trajectory.", "st": 0.61}], "2025-08-23": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda acknowledges sustained inflationary pressures from tight labor markets and elevated wage growth (breaking deflationary equilibrium), while emphasizing labor supply-side adjustments (participation, mobility, tech investment) that complicate inflation dynamics; tone is observational rather than prescriptive, with forward guidance focused on monitoring rather than signaling imminent policy moves, reflecting a data-dependent stance between mild hawkishness on inflation/labor tightness and cautious neutrality on policy path.", "st": 0.85}], "2025-07-23": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor signals cautious stance amid tariff headwinds and food-driven inflation; acknowledges persistent labor tightness supporting wage growth but emphasizes high uncertainty and downside risks to growth; no explicit policy rate guidance but tone suggests patience rather than urgent tightening, with acknowledgment that cost-push factors (rice prices) are expected to wane.", "st": 0.15}], "2025-07-03": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "Takata signals cautious hawkishness: inflation is near 2% target with emerging domestic wage-driven pressures, growth faces tariff headwinds, and BoJ should continue gradual tightening ('shift gears') while pausing to monitor U.S. policy uncertainty—balancing upside price risks against downside growth risks in a narrowly accommodative stance.", "st": 0.9}], "2025-06-25": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Tamura signals moderate hawkishness: inflation near 2% target with upside risks acknowledged, strong wage momentum despite tariff headwinds, and explicit readiness to raise rates despite uncertainties—but tempered by near-term economic slowdown and low reversion risk, positioning policy normalization as gradual rather than urgent.", "st": 0.85}], "2025-06-07": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "연설은 중앙은행의 통화정책이 아닌 업무운영(business operations) 자체에 초점을 맞춘 것으로, 인플레이션, 성장·고용, 통화정책 방향성에 대한 명확한 신호가 거의 없음. 과거 금리 인상(0.5%)에 대한 중립적 언급만 있을 뿐 현재·향후 정책 스탠스를 드러내지 않아 평가 근거 빈약.", "st": 0.0}], "2025-06-03": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda acknowledges tariff-induced downward pressure on growth and acknowledges inflation remains above 2% (3.5% CPI), but emphasizes the wage-price mechanism remains intact with tight labor markets cushioning demand; policy stance is cautious/neutral—neither signaling imminent tightening nor easing given high uncertainty, with baseline scenario projecting inflation to 2% despite temporary moderation from tariff shocks.", "st": 0.05}], "2025-05-27": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda signals continued accommodation despite 3 years of inflation above 2%, citing unanchored expectations (1.5-2.0%) and supply shocks as justification, with no hawkish tightening rhetoric; however, acknowledges inflation is at 30-year highs and real rates deeply negative, implying modest upside inflation concern and neutral growth view, while pledging to 'adjust easing as needed' if confidence in baseline improves—a cautiously dovish stance with asymmetric downside economic risks.", "st": -0.1}], "2025-05-22": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "Noguchi signals gradual hawkish normalization (three hikes completed, more measured steps ahead) while tempering inflation concerns by distinguishing temporary supply shocks from sustainable wage-driven inflation; acknowledges upside risks from overseas (tariffs, stagflation) but maintains accommodative stance given 'second force' remains incomplete, resulting in moderate rather than strong policy tightening bias.", "st": 0.6}], "2025-05-16": [{"sp": "NAKAMURA Toyoaki, Member of the Policy Board", "rs": "Nakamura acknowledges current inflation above 2% (3.2% CPI in March 2025) but signals deceleration expected from mid-FY2025 due to waning import price effects; describes moderate economic recovery facing downward pressure from U.S. tariffs with labor market showing wage momentum (2-5% growth) yet vulnerable to external shocks; monetary policy framed as supporting medium-to-long-term improvement rather than immediate tightening or easing, reflecting cautious stance amid high uncertainties around trade policies.", "st": -0.2}], "2025-04-17": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "BOJ shows hawkish tilt with January rate hike and inflation concern (CPI 3.0-3.5%, price-setting behavior shifting upward, wage increases 5.4%), but tempered by moderate growth outlook (1.1% FY2025), pause in March, and explicit vigilance on trade policy downside risks rather than aggressive further tightening signaling.", "st": 1.15}], "2025-03-05": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor Uchida signals moderate hawkishness: CPI sustained above 2% justifies the January rate hike to 0.5%, but underlying inflation remains below target, so further tightening will be gradual and conditional on economic data—maintaining accommodation while acknowledging inflation risks and labor market tightness that suggest economy is operating above potential.", "st": 0.85}, {"sp": "UEDA Kazuo, Governor", "rs": "연설은 국제통화체제와 자본흐름의 거시금융 안정성에 관한 역사적·제도적 분석으로, 일본의 현재 통화정책 스탠스(금리 인상·인하, 인플레 우려·통제)를 직접 드러내지 않으며 지정학적 리스크 관리와 국제협력 강화를 강조하는 중립적 담론이다.", "st": 0.0}], "2025-02-19": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "매파 신호 우세: 인플레 목표 달성 진전, 임금·물가 선순환 강화, 추가 금리 인상 결정 및 향후 단계적 조정 필요성 강조하면서도, 실질금리 큰 폭 음수 유지·완화적 금융 환경 지속으로 정책 경로는 중간~약한 매파 수준; 미국 경제 상향 리스크·엔화 약세·금융시장 변동성 등 상방 물가 위험 경고로 인플레이션 축은 상향 평가.", "st": 1.15}], "2025-02-06": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Tamura signals hawkish monetary tightening with explicit upside inflation risks, firm wage growth expectations anchoring 2% inflation, and a clear path to 1% rates by H2 2025; growth outlook remains solid (1.1% FY2025) with labor shortages driving price pressures, though some concern about consumer sentiment from sustained price elevation.", "st": 1.3}], "2025-01-30": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor Himino signals measured policy normalization (rate hike in January, further rises if outlook holds) while emphasizing accommodation remains, focusing on structural growth prospects rather than inflation urgency; tone is intellectually exploratory and gradual rather than hawkish on inflation or dovish on growth, reflecting Japan's distinct disinflation narrative and balance-sheet resilience.", "st": 0.5}], "2025-01-14": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "이 연설은 과거 통화정책 회고와 현재 상황 평가에 중점을 두며, 물가안정목표를 지속적으로 달성 가능하게 되었고 임금-물가의 선순환이 형성되었다고 강조(완화신호)하나, 동시에 실질금리가 여전히 마이너스이며 정상화 필요성을 암시하고(매파신호), 구조적 도전(인구감소, 세계화)이 남아있다고 경고하는 등 톤이 혼합되어 있음. 직접적 정책 방향 제시보다는 정책 검토 성과와 경제 구조 분석에 집중하여 통화정책 신호의 명확성이 다소 낮음.", "st": -0.25}], "2026-06-03": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda acknowledges significant upside inflation risks from oil shock (CPI projected 2.8% with possibility exceeding 3%), emphasizes need to monitor underlying inflation pass-through, yet explicitly states monetary policy should not mechanically address temporary supply-driven inflation; maintains accommodative stance with real rates still negative and no imminent rate hike signaled, positioning for cautious data-dependency rather than near-term tightening despite acknowledged price risks.", "st": 0.55}], "2026-05-27": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda delivers a historical analysis of oil shocks rather than direct monetary policy guidance; he acknowledges recent inflation regime shift and wage norm changes (slightly hawkish on inflation), but emphasizes Japan's modest expectations anchoring and lack of 1970s-style spiral (slightly dovish), while remaining neutral on immediate policy path—the speech is analytical and backward-looking rather than forward-looking on policy stance.", "st": 0.15}], "2026-05-16": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Speech is primarily about fintech, digital currencies, and payment system architecture rather than monetary policy stance on inflation, growth, or interest rate path; no explicit signals on restrictiveness vs accommodation of monetary conditions.", "st": 0.0}], "2026-03-03": [{"sp": "UEDA Kazuo, Governor", "rs": "연설은 금융기술과 결제시스템 인프라 개선에 집중하며, 통화정책의 방향성(금리, 긴축/완화)에 대한 직접적 언급이나 명확한 스탠스가 부재하므로 세 축 모두 중립 평가이며 신뢰도는 매우 낮음.", "st": 0.0}], "2026-03-02": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor Himino signals moderate growth with labor supply strain but GDP gap near zero, underlying inflation rising toward 2% target though not yet confirmed there, with a balanced view that current accommodative conditions remain appropriate pending fuller achievement of price stability—neither clearly hawkish nor dovish, reflecting data-dependent gradualism.", "st": 0.35}], "2026-02-26": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "매파 신호 약함: 물가목표 거의 달성, 임금인상 정착, 인플레 기대 상향으로 인플레 우려(+1.5), 고용·임금 견조로 성장노동 긍정(+1)이나, 통화정책은 '수년간의 완화 계속'과 '출구 조건 모호'로 중립 경향(-0.5). 해외 회복 기대와 과열 우려 언급도 있으나, 현 기조 전환 의사는 명확하지 않음.", "st": 0.4}], "2026-02-13": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "The speaker (BOJ Policy Board member Tamura) signals moderately hawkish stance: inflation at ~2.5% with underlying CPI sticky around 2%, wage-price interaction mechanism solidifying, and confirmation of 2% target achievement expected; growth moderate but supported by firm business sentiment and accommodative conditions; policy path continues gradual normalization with rates raised to 0.75% and further hikes signaled if baseline outlook materializes, though real rates remain 'significantly low,' indicating incomplete tightening cycle rather than strong restrictive messaging.", "st": 1.05}]}}, "ECB": {"label": "유로존 (ECB)", "dates": ["2024-01-10", "2024-02-08", "2024-02-09", "2024-02-12", "2024-02-14", "2024-02-15", "2
