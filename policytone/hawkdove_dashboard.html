 about near-term domestic inflation and wage pressures, justifying a 25bp cut; growth outlook has been revised down with labour demand softening, yet labour market remains resilient; policy stance is gradually easing but explicitly preserves optionality and avoids forward guidance, reflecting elevated uncertainty and asymmetric risks.", "st": -0.45}], "2024-12-16": [{"sp": "Isabel Schnabel", "rs": "Schnabel signals cautious easing with 'gradual' approach and confidence in disinflation trajectory (-1.0 on policy_path), yet emphasizes upside inflation risks (services 3.9%, energy/food shocks, ETS2, euro depreciation) and acknowledges reaching neutral rates (0.5 on inflation), while noting growth remains solid but faces structural challenges and trade uncertainty (-0.5 on growth_labor); overall tone is moderately dovish on near-term cuts but vigilant on inflation stability and growth limitations beyond monetary policy reach.", "st": -0.45}, {"sp": "Christine Lagarde", "rs": "Lagarde signals a clear shift from restrictive to accommodative stance, dropping the 'sufficiently restrictive' framing and moving to 'appropriate' policy with expectations of further rate cuts; inflation risks have moderated (inflation on track to 2% in 2025, wage growth slowing, PCCI stable), but downside risks to growth have emerged as dominant concern (significant growth forecast misses, household caution, geopolitical uncertainty), warranting easier policy ahead despite lingering services inflation.", "st": -0.55}], "2024-12-04": [{"sp": "Christine Lagarde", "rs": "Lagarde signals cautious optimism on disinflation while acknowledging near-term growth weakness and elevated downside risks; recent rate cuts (25bp in Oct after June/Sept) with patient 'data-dependent' stance and explicit non-pre-commitment suggest easing tilt, though inflation remains above target at 2.3% headline and core at 2.7%, preventing full dovish stance.", "st": -0.45}], "2024-11-28": [{"sp": "Philip R. Lane", "rs": "Lane's speech is primarily forward-looking and structural in nature, discussing long-term challenges (digitalization, climate, geopolitics, demographics) and analytical frameworks for monetary policy rather than current inflation or labor market conditions or immediate policy stance; while mentioning price stability and policy tools, the speech contains no hawkish or dovish signals regarding current or near-term monetary policy direction, making scores neutral across all axes with low confidence.", "st": 0.0}], "2024-11-25": [{"sp": "Philip R. Lane", "rs": "Lane discusses navigating disinflation through data-dependent flexibility and transmission monitoring rather than signaling further tightening or easing; inflation concerns acknowledged but framed as manageable via cautious calibration, growth/labor not directly addressed, overall stance is adaptive and conditional rather than directional.", "st": 0.05}], "2024-11-22": [{"sp": "Isabel Schnabel", "rs": "연설 전문이 제목과 기본 정보만 포함되어 있어 실질적인 통화정책 스탠스, 인플레 평가, 성장·고용 전망, 정책 경로에 대한 구체적 언급이 없어 판단 근거가 극히 빈약함.", "st": 0.0}, {"sp": "Christine Lagarde", "rs": "이 연설은 자본시장 통합, 저축-투자 파이프라인, 혁신 자금조달 등 구조적 경제 과제에 중점을 두고 있으며, 통화정책의 방향성(금리 인상/인하), 인플레이션 우려, 노동시장 상황에 대한 직접적인 언급이 거의 없어 통화정책 신호로서의 가치가 극히 제한적임.", "st": 0.0}], "2024-11-21": [{"sp": "Frank Elderson", "rs": "Elderson signals that disinflation is progressing well and rates have been cut 75bps, but warns of emerging bottlenecks (geopolitical, climate, fragmentation) that pose medium-term inflation risks requiring less tolerance for deviations and potentially more proactive policy responses, implying a cautious hold with asymmetric upside bias rather than clear easing or tightening.", "st": 0.45}], "2024-11-19": [{"sp": "Frank Elderson", "rs": "Speech is primarily focused on nature-related financial risks and supervisory expectations rather than immediate monetary policy stance; inflation mention is indirect (supply disruptions impact prices), growth/labor discussion is absent, and policy path references only future strategy assessment without current tightening/easing signals, resulting in low confidence and near-neutral positioning.", "st": 0.15}], "2024-11-18": [{"sp": "Christine Lagarde", "rs": "Speech focuses on long-term structural economic challenges (productivity, technology, geopolitics) and social policy rather than direct monetary policy stance; no explicit discussion of inflation risks, rate path, or near-term policy decisions; growth and labor concerns implicit in productivity lag and AI employment transition risks, but not framed as immediate demand-side pressures warranting policy adjustment.", "st": -0.2}, {"sp": "Philip R. Lane", "rs": "Lane retrospectively justifies the ECB's initial patient stance (2021) as reasonable given supply-shock dominance and forecast uncertainty, acknowledges the subsequent sharp tightening was appropriate, and emphasizes disinflation is progressing—a balanced, backward-looking assessment that neither signals urgency for further hikes nor suggests imminent cuts; inflation concerns remain moderate (+1) as energy shocks are now historical, growth/labor demand is normalized (0), and policy path is neutral (0) since he affirms past tightening was correct without advocating further moves.", "st": 0.3}, {"sp": "Luis de Guindos", "rs": "Speech focuses heavily on financial stability vulnerabilities and regulatory resilience rather than monetary policy stance; inflation moving toward 2% target (disinflation signal) but growth outlook significantly weakened with downward revisions; no explicit forward guidance on rate path—emphasizes maintaining regulatory standards and macroprudential frameworks rather than signaling easing or tightening, suggesting a holding pattern amid uncertainty.", "st": -0.6}], "2024-11-16": [{"sp": "Isabel Schnabel", "rs": "연설 제목과 기본 정보만 제시되었으며 실제 통화정책 입장, 인플레이션 평가, 성장·고용 전망, 정책 방향에 대한 구체적인 발언 내용이 없어 판단 근거가 극히 부족함.", "st": 0.0}], "2024-11-15": [{"sp": "Piero Cipollone", "rs": "Cipollone signals dovish stance: inflation converging to 2% target with downward risks emerging, growth fragile with downside risks, and he explicitly argues against excessive restriction, advocating continued rate cuts toward neutral despite acknowledging cyclical recovery remains weak and uncertain.", "st": -1.25}], "2024-11-14": [{"sp": "Isabel Schnabel", "rs": "Schnabel signals cautious but measured hawkishness: acknowledges upside inflation risks and structural uncertainty requiring agility, strongly reaffirms policy rates as primary tool and successful tightening, yet tempers by noting inflation fight 'not yet won' and emphasizing need for flexibility rather than rigid stance; no strong growth concerns mentioned but neutral on labor markets; policy_path moderately hawkish (+1) as she advocates higher bar for future ease but stops short of signaling further imminent hikes.", "st": 0.8}], "2024-11-07": [{"sp": "Isabel Schnabel", "rs": "Speech primarily addresses technical balance sheet mechanics and money market operations with minimal inflation or growth assessment; mild easing signal from discussing liquidity provision elasticity and framework adjustments, but overall neutral stance focused on implementation rather than policy direction.", "st": -0.25}], "2024-11-06": [{"sp": "Luis de Guindos", "rs": "ECB signals easing bias with two rate cuts (75bp cumulative since June) and explicit acknowledgment that disinflation is 'well on track' and inflation expected to decline to 2% target next year; however, inflation remains above target at 2.0% and services inflation persistent at 3.9%, warranting modest positive inflation score; growth indicators show clear weakness (manufacturing contracting 19 months, PMI 45.9, activity weakening), justifying negative growth_labor; policy_path negative due to 'moderating restriction' language and data-dependent pivot away from tightening, though not aggressive accommodation given inflation persistence and forward guidance avoiding pre-commitment.", "st": -0.55}, {"sp": "Christine Lagarde", "rs": "This is a supervisory/structural speech celebrating SSM achievements, not a monetary policy stance. It addresses banking regulation and capital market integration rather than inflation concerns or interest rate direction; the sole growth reference notes Europe's investment needs but carries no hawkish or dovish rate implication.", "st": -0.2}], "2024-11-05": [{"sp": "Isabel Schnabel", "rs": "연설 제목과 기본 정보만 제시되었으며 실제 정책 스탠스, 인플레이션 우려도, 노동시장 평가, 정책 경로에 대한 구체적 언급이 전혀 없어 통화정책 신호를 판단할 근거가 부족함.", "st": 0.0}, {"sp": "Christine Lagarde", "rs": "Lagarde's speech centers on competition policy's structural benefits for inflation control and productivity growth, not immediate monetary stance; while she emphasizes competition's disinflationary effects and monetary transmission benefits (supportive of current restrictive policy logic), the speech lacks direct signals on rate paths or near-term policy moves—treating these as long-term framework issues rather than current cyclical guidance, yielding neutral-to-slightly-dovish structural positioning with low policy confidence.", "st": -0.5}], "2024-10-28": [{"sp": "Luis de Guindos", "rs": "de Guindos signals disinflation is progressing well with inflation expectations anchored, but emphasizes sustained restrictive stance and data dependency; growth is visibly weakening with downside risks, yet labor market remains resilient—resulting in a moderately hawkish baseline (continued restriction) offset by acknowledged economic softening and absence of forward rate guidance, indicating a pause in tightening rather than sustained hikes.", "st": -0.05}], "2024-10-25": [{"sp": "Christine Lagarde", "rs": "Lagarde signals cautious easing after October cut, emphasizing disinflation progress but maintaining restrictive stance due to elevated wage-driven domestic inflation; growth and labor market show cooling signals, while policy path reflects conditional flexibility tied to data rather than committed loosening—a measured hawkish-to-neutral transition.", "st": 0.3}], "2024-10-24": [{"sp": "Philip R. Lane", "rs": "Lane emphasizes disinflation progress (PCCI 1.9%, core 2.7%) and expects further moderation via wage decline and past policy transmission, but acknowledges services inflation still elevated above its 2.4% underlying trend with temporary factors inflating it; the tone is neither strongly hawkish nor accommodative—data-dependent calibration suggesting patience as dynamics work through, with modest upside inflation concern offset by clear disinflationary momentum and labor market cooling signals.", "st": 0.05}], "2024-10-07": [{"sp": "Piero Cipollone", "rs": "This speech focuses entirely on digital financial infrastructure, tokenisation, and capital markets integration technology; it contains no substantive discussion of monetary policy stance, inflation outlook, labor market conditions, or interest rate path decisions, making it inappropriate for monetary policy assessment on the specified axes.", "st": 0.0}], "2024-10-04": [{"sp": "Frank Elderson", "rs": "연설은 기후·자연 리스크의 금융시스템 영향에 관한 것으로, 통화정책의 가격안정 목표나 금리 경로, 인플레 전망, 노동시장·성장 상황에 대한 직접적 언급이 거의 없으며, 감시 기능과 자산 포트폴리오 구성에 초점이 있어 현재의 통화정책 스탠스 판단 근거가 빈약함.", "st": 0.0}], "2024-10-02": [{"sp": "Isabel Schnabel", "rs": "Schnabel acknowledges that monetary tightening successfully dampened demand and restored price stability, but emphasizes that growth remains weak and structural challenges (not policy) now dominate; she signals support for gradual policy normalization ('dialling back monetary policy restraint since June') and indicates monetary policy alone cannot solve euro area stagnation, pointing to competitiveness and innovation deficits as primary constraints—a dovish posture focused on growth support over inflation vigilance.", "st": -1.0}, {"sp": "Luis de Guindos", "rs": "연설은 통화정책 스탠스보다 구조적 생산성 개혁과 재정·산업정책에 집중하며, '제약적 정책의 점진적 약화'와 '회복 강화'라는 약한 완화 신호를 암시하나 물가나 노동시장 과열 우려는 직접적으로 제시하지 않아 신뢰도가 낮음.", "st": -0.7}], "2024-10-01": [{"sp": "Luis de Guindos", "rs": "This is a welcome address focused on the methodological role of expectations surveys in central banking, not a monetary policy stance speech. It contains no direct signals on current inflation concerns, labor market assessment, or future policy direction—de Guindos discusses survey tools and their historical utility (COVID, 2022 inflation) for analytical purposes only, with neutral retrospective tone rather than forward guidance or near-term policy signals.", "st": 0.0}], "2024-09-30": [{"sp": "Christine Lagarde", "rs": "Lagarde signals cautious easing (25bp cut in September, data-dependent path) while maintaining restrictive stance; inflation trajectory supports confidence in 2% target return, but weak growth momentum, slowing employment, and subdued domestic demand suggest policy accommodation phase beginning—positioning neither strongly hawkish nor dovish, but tilting slightly hawkish on inflation vigilance with dovish growth-labor concerns.", "st": 0.05}], "2024-09-27": [{"sp": "Piero Cipollone", "rs": "연설은 디지털 유로와 결제 시스템 통합에 관한 정책 논의이며, 통화정책의 금리·제약성·인플레이션 우려와는 무관하게 금융 인프라 및 주권 문제에 집중하고 있어 통화정책 스탠스 판단 근거가 극히 미흡함.", "st": 0.0}], "2024-09-26": [{"sp": "Christine Lagarde", "rs": "이 연설은 금융안정성과 기술혁신을 다루는 거시건전성정책(macroprudential) 중심의 담론으로, 통화정책의 인플레이션·성장·금리경로에 대한 직접적인 신호가 전혀 없음.", "st": 0.0}], "2024-09-20": [{"sp": "Christine Lagarde", "rs": "Lagarde presents a balanced, forward-looking assessment: inflation expectations are anchored and disinflation is on track with minimal employment costs (supporting -0.5 on policy_path), yet she emphasizes uncertainty and the need for adaptive frameworks rather than signaling imminent rate cuts; modest upside inflation concern from fragmentation/supply chains (+0.5 inflation) and neutral growth outlook (0.0) reflect structural rather than cyclical focus.", "st": -0.1}], "2024-09-16": [{"sp": "Philip R. Lane", "rs": "Lane signals easing confidence in disinflation trajectory (justifying the 25bp cut to 3.5%) and acknowledges downside risks to growth/recovery, but maintains vigilance on wage dynamics and headline volatility while emphasizing optionality for both faster/slower adjustment—a moderately dovish but cautious stance prioritizing flexibility over commitment to a fixed path.", "st": -0.45}], "2024-09-06": [{"sp": "Frank Elderson", "rs": "연설은 자연 관련 금융 리스크와 중앙은행 감독 권한의 법적 함의에 집중하며, 통화정책 스탠스나 금리 경로에 대한 직접적 신호는 없음. 성장·고용에 대해 생태계 악화가 경제 회복력을 감소시킨다는 언급만 있어 미약한 약세(-1) 신호, 인플레와 정책 방향은 중립적.", "st": -0.2}], "2024-08-30": [{"sp": "Isabel Schnabel", "rs": "Schnabel signals cautious hawkishness: acknowledges disinflation progress but emphasizes persistent services inflation (4.4% domestic), advocates persevering with restrictive policy to avoid early exit (citing Romer research), yet presents uncertainty through scenario analysis with manageable growth risks—balancing inflation focus over growth concerns with acknowledgment that soft landing remains likely.", "st": 1.05}], "2024-08-24": [{"sp": "Philip R. Lane", "rs": "Lane presents a successful restrictive tightening cycle that has effectively contained inflation expectations and dampened demand, with inflation concerns moderating but labour markets remaining resilient; policy maintains a cautious data-dependent stance without explicit forward guidance for cuts, reflecting near-term vigilance with room for eventual normalization as disinflation progresses.", "st": 0.35}], "2024-07-23": [{"sp": "Philip R. Lane", "rs": "This is a welcome address focused on research methodology, data infrastructure, and academic foundations for ECB policy work rather than direct monetary policy stance communication; it contains no explicit signals about current inflation concerns, labor market assessment, or near-term policy direction, making assessment highly uncertain.", "st": 0.0}], "2024-07-04": [{"sp": "Piero Cipollone", "rs": "연설은 AI의 거시경제적 영향을 분석적으로 다루지만, 현재의 통화정책 스탠스나 정책 방향성을 직접 언급하지 않으며, 인플레·성장·정책경로에 대한 명확한 매파/완화 신호가 부재하고 정책당국자의 입장 표명이 아닌 기술 논의 중심이므로 통화정책 평가로서 근거가 빈약함.", "st": 0.0}], "2024-07-01": [{"sp": "Christine Lagarde", "rs": "Lagarde signals cautious completion of tightening cycle: inflation conquered (10.6%→2.6%), first cut delivered in June 2024, but emphasizes vigilance on upside risks (wage dynamics, profit-price nexus), acknowledges growth was dampened (5 quarters stagnation near-bottom soft landing range), and commits to data-dependent path forward rather than predetermined easing—a moderately hawkish hold reflecting mission accomplished but uncertainty ahead.", "st": 0.45}], "2024-06-26": [{"sp": "Philip R. Lane", "rs": "Lane's speech is primarily academic and retrospective, reviewing monetary analysis frameworks rather than signaling current policy direction; while acknowledging pandemic-era accommodative measures and supply-driven inflation (completed), the tone avoids hawkish or dovish commitments on future policy, resulting in near-neutral positioning with modest downward tilt reflecting past support for growth/employment during crisis.", "st": -0.35}], "2024-06-18": [{"sp": "Luis de Guindos", "rs": "이 연설은 금융통합·자본시장연합·은행연합 구축 등 구조적·제도적 의제에 집중하며, 통화정책 스탠스(금리·긴축·완화)에 대한 직접적 언급이 전무하고, 인플레·성장·노동시장 평가도 부재하여 통화정책 분석 대상으로 부적절함.", "st": 0.0}], "2024-06-14": [{"sp": "Christine Lagarde", "rs": "Lagarde acknowledges upside inflation risks from geopolitical and climate shocks while noting recent rate cuts and a three-component framework balancing forward/backward-looking elements; however, the tone emphasizes structural uncertainty, near-term disinflationary forces (recent 70% forecast improvement), and policy flexibility in response to economic weakening, creating a cautiously dovish stance that subordinates growth to inflation control but leans toward accommodation given downside growth risks.", "st": -0.4}], "2024-06-11": [{"sp": "Philip R. Lane", "rs": "Lane signals disinflation progress (inflation 2.6% in May vs 8.4% in 2022) and justifies a 25bps rate cut, but explicitly maintains restrictive stance (3.75% still 'clearly restrictive'), rejects forward guidance, and emphasizes wage persistence in 2024 and upside risks to inflation—balancing easing action with hawkish conditionality and data-dependency that permits slower cuts if inflation surprises persist.", "st": -0.35}], "2024-06-07": [{"sp": "Isabel Schnabel", "rs": "Schnabel affirms strong past monetary tightening (4.5% hikes, credible inflation control, anchored expectations) and emphasizes fiscal consolidation's necessity going forward, but carefully frames TPI as preserving monetary dominance rather than signaling further tightening; yesterday's 25bp cut and 'cannot pre-commit to rate path' soften hawkish messaging, yielding slight net tightening bias without strong conviction.", "st": 0.4}], "2024-05-28": [{"sp": "Isabel Schnabel", "rs": "Schnabel presents a balanced, nuanced assessment of asset purchases: acknowledging their crisis-fighting effectiveness (supportive of past QE) while cautioning that effects diminish outside crises and proportionality concerns rise—neither hawkish on current inflation nor dovish on easing, but emphasizing context-dependence and careful cost-benefit analysis rather than forward guidance on immediate policy direction.", "st": 0.15}], "2024-05-27": [{"sp": "Philip R. Lane", "rs": "Lane signals substantial disinflation progress (5.2% to 2.4% headline) with services inflation as remaining concern, acknowledges restrictive stance has worked and transmission still unfolding, but indicates readiness to ease at June meeting if confidence in target convergence increases—a cautiously dovish turn from the September 2023 rate peak with measured language avoiding commitment to prolonged restriction.", "st": -0.1}], "2024-05-26": [{"sp": "Piero Cipollone", "rs": "연설은 주로 기후변화와 녹색전환의 거시경제적 함의를 다루며, 통화정책 내용은 부수적임. ECB가 인플레 통제에 성공(10.6%→2.4%)했고 제약적 기조를 '완화할 수 있다(dial back)'고 언급하나, 공급충격 위험으로 인한 인플레 상방 우려도 명시적으로 제기되어 매파·완화 신호가 혼재되어 있음.", "st": 0.05}], "2024-05-02": [{"sp": "Philip R. Lane", "rs": "Lane justifies completed tightening to restrictive 4.0% DFR as necessary to combat large inflation surprise and prevent expectation de-anchoring, while emphasizing persistent stance shift toward neutral (not easing); inflation concerns remain elevated but longer-term expectations well-anchored; growth-labor market side shows muting from energy shock and uncertainty, though not explicitly weakening; overall tone is hawkish retrospective on completed tightening with forward guidance toward hold-then-gradual-normalization rather than imminent cuts.", "st": 0.85}], "2024-04-29": [{"sp": "Luis de Guindos", "rs": "De Guindos signals cautious optimism on disinflation trajectory (inflation peaking, goods inflation collapsed) but emphasizes persistent services inflation stall and elevated unit labour cost dynamics, requiring sustained restrictive policy; growth remains subdued with downside risks, yet employment resilient; forward guidance stresses restrictive stance continuation conditional on inflation convergence, without pre-committing to easing—a hawkish-leaning conditional tone for April 2024.", "st": 0.7}], "2024-04-22": [{"sp": "Christine Lagarde", "rs": "Speech focuses on long-term structural economic challenges (innovation, productivity, supply chains, market integration) rather than near-term monetary policy stances; contains no direct guidance on interest rates, inflation targeting, or policy tightening/easing—essentially non-monetary-policy content delivered by a central bank leader.", "st": 0.0}], "2024-04-19": [{"sp": "Christine Lagarde", "rs": "Lagarde signals sustained restrictive stance with clear language ('sufficiently restrictive for as long as necessary') conditional on inflation convergence, reflecting hawkish policy path; inflation concerns remain elevated despite progress (headline 2.4%, core 2.9%), while growth stagnation and cooling labour demand suggest economic weakness—a classic restrictive-hold posture in April 2024 before the disinflationary gains and labour-market softening became clearer.", "st": 0.6}], "2024-04-18": [{"sp": "Luis de Guindos", "rs": "매파적 기조: 인플레 하강 진행 중이나 국내 물가압력 여전히 높아 제약적 기조 지속 필요 강조, 정책 완화는 '인플레 수렴 확신 강화 시' 조건부 제시하며 선제적 인하 회피. 성장은 약세 신호('weak start', 투자 부진, 소비 침체)나 노동시장 견조함이 부분 상쇄. 높은 신뢰도: 통화정책이 중심이며 톤 일관성 있음.", "st": 0.7}], "2024-04-17": [{"sp": "Isabel Schnabel", "rs": "Schnabel presents a nuanced reassessment of inflation targeting: while defending its core framework, she emphasizes that recent shocks require moving beyond mechanical forecast targeting toward data-dependence, elevated uncertainty, and caution about premature normalization—neither clearly hawkish nor dovish, but cautionary about future inflation dynamics and policy transmission in a world of structural supply shocks.", "st": 0.05}], "2024-04-15": [{"sp": "Philip R. Lane", "rs": "Lane signals disinflation progress with inflation falling to 2.4% and expectations anchored, but flags persisting services/wage inflation requiring ongoing restriction; the GC indicated readiness to cut if confidence in sustained convergence strengthens further, reflecting a dovish tilt from the restrictive 4.0% holding stance while maintaining conditionality on inflation dynamics.", "st": -0.85}], "2024-03-27": [{"sp": "Piero Cipollone", "rs": "Cipollone signals cautious pivot toward easing: inflation convergence to 2% by mid-2025 is increasingly confident (disinflationary tone), but emphasizes proportionality given 18-month economic stagnation and downside risks; policy_path near neutral (acknowledging need to dial back restriction if data confirms projections) rather than hawkish; growth_labor negative due to weak domestic demand, depressed consumption, and need for wage moderation despite labor market tightness; inflation score modest (+0.5) as disinflation progress is strong but services inflation remains above target and wage-productivity gap noted as medium-term concern.", "st": -0.05}], "2024-03-20": [{"sp": "Isabel Schnabel", "rs": "Schnabel's speech is primarily an academic analysis of r* determinants (savings-investment vs. monetary policy hypotheses) rather than a direct policy stance. She discusses past rate movements and structural forces neutral­ly, avoids hawkish/dovish language about current stance or future tightening/easing, and concludes with uncertainty about mechanisms—not a clear signal on inflation concerns, growth outlook, or policy direction.", "st": 0.0}, {"sp": "Christine Lagarde", "rs": "Lagarde signals cautious readiness to begin easing (policy_path:-0.5) contingent on May-June data validation, with inflation projections improved but domestic pressures (services/wages at 4%+) still stubbornly persistent, yielding a hawkish-leaning neutral stance rather than committed dovish pivot—growth and labor markets show resilience (2M jobs in 2023, tight labor market) offset by productivity concerns, justifying neutral growth_labor score.", "st": -0.1}], "2024-03-14": [{"sp": "Isabel Schnabel", "rs": "연설은 통화정책 시행의 기술적 운영틀(operational framework) 개편에 집중하며, 현재의 통화정책 스탠스(금리 인상 또는 인하)나 향후 정책방향에 대한 명시적 신호를 거의 포함하지 않음; 과거 25년 경험 회고와 유동성 체계 전환만 다루어 거시경제 전망·인플레 우려·성장 진단이 부재하고, 정책 정상화 경로도 구체적 타이밍을 제시하지 않아 매파·완화 신호 모두 불명확.", "st": 0.0}], "2024-02-26": [{"sp": "Christine Lagarde", "rs": "Lagarde maintains a cautiously restrictive stance with emphasis on 'data-dependent' continuation of restriction until confident inflation sustainably reaches 2%, acknowledges wage pressures and second-round risks warranting vigilance, but confirms rates unchanged and expects disinflationary momentum; growth weak but labor market resilient with moderating signs; mixed signals prevent stronger hawkish or dovish positioning.", "st": 0.3}], "2024-02-16": [{"sp": "Isabel Schnabel", "rs": "Schnabel signals cautious monetary restrictiveness tied to persistent inflation risks from weak productivity growth and strong nominal wage growth, with emphasis on avoiding premature policy adjustment; acknowledges labor market challenges (demographic headwinds, reduced work hours) but frames these through productivity lens rather than cyclical softening, creating a moderately hawkish tone on policy path despite acknowledging growth constraints.", "st": 0.95}], "2024-02-15": [{"sp": "Christine Lagarde", "rs": "Lagarde signals measured hawkishness: acknowledges disinflation progress and holds rates steady, but emphasizes need for confidence in sustained return to target, highlights persistent wage pressures and tight labour markets, and commits to data-dependent restriction—stopping short of rate cuts despite moderating inflation headline, positioning for 'higher for longer' conditional on wage dynamics.", "st": 0.55}], "2024-02-14": [{"sp": "Luis de Guindos", "rs": "De Guindos signals cautious optimism on disinflation progress while maintaining hawkish stance: inflation trending down but wage pressures and profit resilience warrant sustained restrictive policy; growth stagnating near-term with labor market robust despite slowing demand; policy path explicitly commits to restrictive rates 'as long as necessary' pending wage-settlement confirmation, avoiding premature easing signals while acknowledging data dependence.", "st": 0.9}], "2024-02-12": [{"sp": "Piero Cipollone", "rs": "연설은 주로 EMU 구조·재정정책·경쟁력 개선 등 거시경제 구조를 다루며, 직접적인 통화정책 스탠스는 제한적이나 '인플레 기대 고정·공급충격 완화 국면에서 금리 추가 인하 불필요'라는 약한 완화 신호가 일부 포함되어 있음.", "st": -0.25}, {"sp": "Philip R. Lane", "rs": "This speech is primarily a technical analysis of euro area international financial flows and external statistics methodology, with limited direct monetary policy signaling. While the speaker mentions 'monetary policy tightening' and 'interest rate environment' as contextual factors affecting portfolio flows, the speech does not articulate clear prospective stances on inflation risks, labor market conditions, or future policy path—it focuses on descriptive measurement challenges and historical flow decomposition rather than forward guidance or policy inclination.", "st": 0.0}], "2024-02-09": [{"sp": "Piero Cipollone", "rs": "연설은 통화정책 스탠스와 무관하게 중앙은행 화폐의 기술적 혁신과 결제 시스템 현대화에 집중하며, 금리·긴축·완화 신호가 전혀 포함되지 않음.", "st": 0.0}], "2024-02-08": [{"sp": "Philip R. Lane", "rs": "Lane presents a dovish-leaning narrative emphasizing successful disinflation progress (inflation down to 2.8% from 10.6% peak, tracking toward 2% target by mid-2025), temporary shock-driven components fading, and monetary tightening's past contribution, while acknowledging core/services inflation persistence and wage dynamics still elevated—suggesting current restrictive policy has worked and a hold/data-dependent stance, not further tightening signals.", "st": -0.5}], "2024-01-10": [{"sp": "Luis de Guindos", "rs": "de Guindos signals modest hawkishness on inflation (disinflation progressing but uncertainties remain, wage pressures cited) and balance sheet tightening continuation, but acknowledges growth slowdown with soft December data and first labour market corrections; the phrase 'maintained for sufficiently long duration' suggests rates held rather than imminent cuts, yet explicit forward guidance is cautious and data-dependent rather than aggressive, positioning the ECB as vigilant but not in active tightening mode as of January 2024.", "st": 0.2}], "2025-12-19": [{"sp": "Piero Cipollone", "rs": "이 연설은 중앙은행 통화정책 스탠스와 무관하게 디지털 화폐·결제 인프라 현대화에 관한 구조적·기술적 논의에 집중하며, 인플레이션, 성장·고용, 금리 정책 방향에 대한 직접적 신호가 거의 없다.", "st": 0.0}], "2025-12-08": [{"sp": "Piero Cipollone", "rs": "연설은 금융 기술 혁신과 디지털 화폐 전략에 초점을 맞추고 있으며, 통화정책의 기조·방향성(인상/인하, 제약적/완화적)에 대한 직접적인 신호가 전혀 없음.", "st": 0.0}], "2025-12-03": [{"sp": "Christine Lagarde", "rs": "Lagarde signals inflation under control near 2% target with moderating wage growth, maintains data-dependent stance without rate guidance, and keeps policy neutral given balanced risks and global uncertainty—neither hawkish on tightening nor dovish on easing.", "st": 0.15}, {"sp": "Philip R. Lane", "rs": "Lane emphasizes flexible, context-dependent responses to inflation deviations with careful distinction between supply vs. demand shocks and transitory vs. persistent effects; euro appreciation generates material disinflationary drag; tone is thoughtful/analytical rather than hawkish urgency, suggesting patience on policy tightening despite acknowledging need for proportionate responses to material deviations.", "st": -0.75}], "2025-11-24": [{"sp": "Christine Lagarde", "rs": "이 연설은 AI와 교육에 관한 일반적 경제 담론으로, 통화정책의 직접적 언급이 전혀 없으며 물가, 금리 결정, 통화 긴축/완화 신호가 부재하여 통화정책 애널리시스 기준으로 판단 근거가 극히 부족함; 다만 장기 생산성 증대 가능성에 대한 낙관적 톤이 미약하게 성장 전망에 영향을 미칠 수 있음.", "st": 0.2}], "2025-11-22": [{"sp": "Christine Lagarde", "rs": "Lagarde emphasizes completed disinflation (inflation near 2%), past aggressive tightening, and balance sheet reduction, signaling policy normalization rather than further tightening; however, focus shifts to long-term growth constraints and fiscal productivity spending rather than near-term monetary stance, creating some ambiguity on imminent policy direction despite hawkish accomplishments.", "st": -0.6}], "2025-11-21": [{"sp": "Christine Lagarde", "rs": "Lagarde emphasizes ECB's role in delivering price stability with 200bp rate cuts and adjustment as needed, but the speech focuses primarily on structural economic issues and Single Market reforms rather than forward monetary policy guidance; labor market strength is highlighted but not as a policy concern, and the tone is mixed between continued policy support ('adjust as needed') and measured language ('increasingly feeding through'), suggesting a slightly accommodative but cautious stance without strong hawkish or dovish signals.", "st": -0.15}], "2025-11-17": [{"sp": "Piero Cipollone", "rs": "This speech focuses entirely on the digital euro project and payments infrastructure with no substantive discussion of monetary policy stance, inflation concerns, growth assessment, or interest rate path decisions.", "st": 0.0}, {"sp": "Luis de Guindos", "rs": "연설은 금융안정성에 집중하며 통화정책을 직접 다루지 않음. 인플레이션은 목표 수렴 중(하방신호)이고 성장은 '낮음'에 대한 우려(약한 하방신호)를 표현하나, 정책경로에 대한 명확한 신호는 부재하여 중립으로 평가함. 거시건전성 및 금융시장 위험이 주요 논제로 통화정책 스탠스 판단의 근거가 미흡함.", "st": -0.5}], "2025-11-06": [{"sp": "Isabel Schnabel", "rs": "연설은 통화정책 스탠스보다는 기술적 운영 프레임워크(양적정상화, 준비금 공급 방식, 구조적 운영)에 집중하며, 인플레·성장·노동시장·금리 경로에 대한 직접적 신호가 거의 없고 금융 시스템 기능성에 초점을 맞추어 통화정책 입장을 판단하기 어려움.", "st": 0.0}], "2025-11-04": [{"sp": "Christine Lagarde", "rs": "이 연설은 통화정책 스탠스가 아닌 불가리아의 유로 채택 편익 설득 연설이며, 인플레이션 관련 논의는 환율 변동성과 통화 전환 효과에 한정되어 있고 중앙은행의 가격 안정성 역할을 강조하는 완화적 톤이나, 통화정책 방향성이나 금리 경로에 대한 명시적 신호가 부재하여 신뢰도가 낮음.", "st": -0.3}], "2025-10-29": [{"sp": "Christine Lagarde", "rs": "본 연설은 유럽의 정치·거버넌스 구조 개혁에 관한 철학적 담론으로, 통화정책의 직접적 신호(인플레이션 방향, 금리 경로, 노동시장 평가)를 전혀 담지 않고 있어 평가 대상이 아님.", "st": 0.0}], "2025-10-23": [{"sp": "Philip R. Lane", "rs": "This speech focuses on financial sector regulation, digital innovation, and European financial integration rather than monetary policy stance, inflation dynamics, or labor market conditions; it contains no direct signals on interest rate path, inflation concerns, or growth/employment outlook.", "st": 0.0}], "2025-10-21": [{"sp": "Christine Lagarde", "rs": "Speech focuses on energy policy and climate transition rather than monetary policy; inflation discussed retrospectively (2022 surge of 37%) without forward guidance on current/future policy stance; no explicit signals on rate path, and growth/labor market receives minimal attention—primarily institutional/policy discussion without hawkish or dovish monetary positioning.", "st": 0.3}, {"sp": "Philip R. Lane", "rs": "Lane emphasizes data-dependency and no pre-commitment while noting easing completed (200bp cut June 2024–June 2025, then paused); credit transmission is gradual/weak despite rate cuts, manufacturing sector struggles due to external factors and cost pressures, yet no explicit inflation concern or urgency to cut further—mixed signals suggest cautious pause rather than clear hawkish or dovish tilt.", "st": -0.35}], "2025-10-18": [{"sp": "Christine Lagarde", "rs": "Speech focuses almost entirely on trade policy and global imbalances rather than monetary policy stance; minimal direct guidance on inflation trajectory, rate path, or labor market assessment; modest negative signal on growth/labor only from mention of export pressures and need for domestic demand support; no clear hawkish or dovish monetary policy signals.", "st": -0.2}], "2025-10-17": [{"sp": "Christine Lagarde", "rs": "ECB signals cautious easing bias with data-dependent stance and acknowledged rate cuts already underway, while inflation remains near target with moderating wage pressures; growth headwinds (tariffs, trade uncertainty) temper optimism despite labor market resilience, suggesting balanced but slightly dovish posture without hawkish urgency.", "st": -0.2}], "2025-10-15": [{"sp": "Luis de Guindos", "rs": "Speech focuses on financial stability infrastructure and banking regulation with no direct discussion of monetary policy stance, inflation trajectory, labor market conditions, or future interest rate decisions; entirely structural/institutional in nature with no hawkish or dovish monetary policy signals.", "st": 0.0}], "2025-10-07": [{"sp": "Christine Lagarde", "rs": "This speech focuses primarily on the euro's international status, structural economic competitiveness, and capital market integration rather than direct monetary policy stance—no explicit signals about inflation control, labor market assessment, or rate path decisions are made, rendering it largely orthogonal to near-term monetary policy signaling.", "st": 0.0}], "2025-10-06": [{"sp": "Christine Lagarde", "rs": "Lagarde signals the disinflationary process is complete with inflation at 2% target and expects stable outlook; monetary policy is on hold with data-dependent approach going forward, suggesting neither urgent tightening nor near-term cuts, but modest growth softening (sluggish exports, softening labour demand despite resilience) and forward wage moderation point slightly dovish overall on the policy normalization cycle.", "st": -0.35}, {"sp": "Philip R. Lane", "rs": "Lane projects benign inflation outlook (2.1% → 1.7% → 1.9%) with ongoing disinflation toward 2% target, emphasizes data-dependent flexibility rather than preset commitment, acknowledges labor market softening and past restrictive stance effects, but flags both upside (fragmentation, defense spending) and downside risks (strong euro, trade tensions); tone is cautiously accommodative post-restrictive phase with symmetric risk management, tilting toward patience rather than further tightening.", "st": -0.45}], "2025-10-03": [{"sp": "Christine Lagarde", "rs": "스피치는 주로 금융안정성과 규제감독에 초점을 맞추고 있으며, 인플레이션 부분에서는 '역사적 고점에서 상당히 하락하여 2% 목표에 도달'이라는 과거 성과만 언급하고 현재 인플레 우려나 금리경로에 대한 직접적 신호는 모호함. 정책경로에서는 규제강화를 강조하는 신중한 톤을 보이나 통화정책 방향성 자체는 명시적으로 제시하지 않아 약한 완화 신호에 가까움.", "st": -0.25}], "2025-09-30": [{"sp": "Christine Lagarde", "rs": "Lagarde signals accommodative stance: tariffs have created minimal inflationary pressure (downside growth risk dominates), the large inflation shock is essentially over, 100bp of cuts already delivered, and policy at 2% provides cushion for further easing if needed; she explicitly rejects forward guidance rigidity and emphasizes data-dependency in a structurally uncertain environment—classic soft-dovish messaging despite geopolitical headwinds.", "st": -1.0}], "2025-09-29": [{"sp": "Piero Cipollone", "rs": "이 연설은 디지털 유로 도입의 지정학적·기술적 의의에 중점을 두고 있으며, 통화정책의 방향성(금리 인상/인하)이나 인플레이션·고용 전망에 대한 직접적인 언급이 거의 없다. 가격안정(price stability)이 한 번 언급되지만 현재의 인플레 상황이나 향후 정책 경로에 대한 구체적 신호는 부재하다.", "st": 0.0}], "2025-09-17": [{"sp": "Piero Cipollone", "rs": "연설은 금융시스템 강화와 중앙은행의 안정화 역할에 중점을 두고 있으며, 통화정책 기조나 금리경로에 대한 직접적인 신호는 거의 없고, 인플레이션 상황이나 노동시장 상태에 대한 평가도 부재하여 통화정책 스탠스 판단의 근거가 매우 제한적임.", "st": 0.0}, {"sp": "Christine Lagarde", "rs": "이 연설은 금융 안정성과 규제 프레임워크에 집중하며 통화정책(금리, 인플레이션, 성장)에 대한 직접적인 입장이 전무하므로 세 축 모두 중립(0)이며 통화정책 신호 신뢰도가 매우 낮음.", "st": 0.0}], "2025-09-15": [{"sp": "Christine Lagarde", "rs": "This speech is primarily a geopolitical address about European strategic autonomy, system power, and international relations—not a monetary policy statement. While Lagarde mentions the ECB's decision-making process as an example of qualified majority voting efficiency, there are no substantive signals regarding inflation assessment, labor market conditions, or interest rate path. The speech lacks direct commentary on current monetary stance, inflation dynamics, disinflation progress, or policy tightening/easing intentions.", "st": 0.0}], "2025-09-03": [{"sp": "Christine Lagarde", "rs": "이 연설은 금융안정성과 거시건전성 규제에 중점을 두고 있으며, 통화정책의 기조(금리 인상/인하, 물가 또는 고용 관점의 정책 방향)에 대한 직접적인 신호가 전혀 없어 세 축 모두 중립(0)으로 평가하고 신뢰도는 매우 낮음.", "st": 0.0}], "2025-09-01": [{"sp": "Christine Lagarde", "rs": "이 연설은 유럽 자율성, 국제법, 중앙은행 독립성에 관한 법·제도 담론 중심이며, 통화정책 입장(매파/완화)과 물가·성장·금리경로에 대한 직접적 신호는 거의 없음. 정책 방향성을 드러내는 제약적(restrictive) 또는 완화(accommodative) 언어 부재.", "st": 0.0}], "2025-08-23": [{"sp": "Christine Lagarde", "rs": "Lagarde emphasizes successful disinflation with minimal employment cost and labour market resilience, suggesting inflation concerns have abated (inflation:+0.5), employment growth remains strong despite structural headwinds (growth_labor:+1.0), yet provides no forward guidance on rate adjustments, maintaining analytical neutrality on policy path (policy_path:0); confidence is moderate as the speech focuses primarily on labour market analysis rather than direct monetary policy signalling.", "st": 0.35}], "2025-08-20": [{"sp": "Christine Lagarde", "rs": "연설은 통화정책보다 무역·경제 실적 평가에 집중; 인플레·금리 경로에 대한 직접 언급 부재하고 '9월 전망이 향후 결정을 안내할 것'이라는 모호한 표현만 있어 정책 스탠스 판단 근거 빈약(confidence 낮음); 노동시장 견조(unemployment 6.2% 안정)는 +신호이나 성장 둔화 예상은 상쇄하여 growth_labor 미약한 상승.", "st": 0.1}], "2025-07-09": [{"sp": "Philip R. Lane", "rs": "Lane signals a pivot toward easing and data dependence after largely achieving disinflation: the June 25bp cut to guard against temporary inflation undershooting, emphasis on two-sided risks and structural uncertainties (trade, AI, demographics), and flexible medium-term orientation suggest accommodation rather than tightening, though growth/labor concerns are present implicitly rather than explicit.", "st": -0.75}], "2025-06-30": [{"sp": "Christine Lagarde", "rs": "Lagarde signals a shift from asymmetric (downside-focused) to symmetric reaction function, acknowledging upside inflation de-anchoring risks and persistent price adjustment behavior, warranting forceful early tightening; however, she emphasizes both directions and flexibility ('appropriately'), avoiding pure hawkish commitment, while maintaining medium-term orientation without raising growth concerns.", "st": 0.55}, {"sp": "Christine Lagarde,Philip R. Lane", "rs": "ECB strategy review emphasizes symmetric price stability commitment and two-sided risks, but acknowledges asymmetric policy challenges (non-linear upside inflation dynamics requiring forceful response vs. downside lower-bound constraints); inflation concerns present but framed within medium-term flexibility rather than imminent tightening signal, reflecting cautious stance amid structural uncertainties rather than strong hawkish or dovish positioning.", "st": 0.55}], "2025-06-26": [{"sp": "Christine Lagarde", "rs": "This is primarily a cultural-historical address about European integration with minimal direct monetary policy content; Lagarde acknowledges growth momentum loss and economic challenges but makes no explicit statements about inflation dynamics, interest rates, or policy stance, resulting in low confidence and near-neutral positioning with slight concern about growth fundamentals.", "st": -0.2}], "2025-06-24": [{"sp": "Philip R. Lane", "rs": "Lane signals that the inflation challenge is 'largely completed' with disinflation 'well on track,' supporting a recent 25bp rate cut justified by preventing undershooting and unwarranted financial tightening; while acknowledging new uncertainties (tariffs, geopolitics, fiscal), he emphasizes data-dependence and meeting-by-meeting flexibility rather than forward guidance, indicating a predominantly accommodative stance oriented toward supporting medium-term target attainment amid downside inflation risks.", "st": -1.0}], "2025-06-23": [{"sp": "Christine Lagarde", "rs": "Lagarde signals cautious easing bias (recent 25bp cut, data-dependent stance, no forward guidance) while inflation is near target and moderating, but acknowledges downside growth risks from trade tensions and geopolitical uncertainty; labour market remains robust yet growth outlook weakened by external headwinds, yielding a mildly dovish to neutral tilt overall.", "st": -0.45}], "2025-06-19": [{"sp": "Christine Lagarde", "rs": "Speech focuses on economic integration, institutional reform, and regional convergence rather than monetary policy stance; no explicit inflation targeting, rate path, or demand-management signals typical of central bank communications; tone is structural/developmental (non-monetary), making confidence very low on monetary policy interpretation.", "st": 0.1}], "2025-06-18": [{"sp": "Frank Elderson", "rs": "이 연설은 통화정책 스탠스를 직접 다루지 않으며, 단일시장 완성을 위한 구조개혁과 규제조화에 중점을 둔 장기 경제정책 제안으로서 인플레·성장·정책경로에 대한 명확한 매파/완화 신호가 거의 없습니다.", "st": 0.1}], "2025-06-12": [{"sp": "Luis de Guindos", "rs": "Speech focuses primarily on structural/financial integration rather than monetary policy stance; inflation at target with moderating wages justifies prior 200bp cuts (completed action, not forward guidance); growth concerns and uncertainty warrant cautious tone without explicit rate path signals, yielding slightly dovish lean but moderate confidence due to geopolitical focus overshadowing policy clarity.", "st": -0.7}], "2025-06-11": [{"sp": "Philip R. Lane", "rs": "Lane signals easing bias via recent rate cut justified by lower inflation path and negative deviation risk; projects modest growth (0.9-1.3%) and anchored inflation expectations; emphasizes data-dependency and determination to return inflation to target, warranting cautious dovish stance across all axes, though maintains measured tone avoiding aggressive commitment to further cuts.", "st": -1.15}, {"sp": "Christine Lagarde", "rs": "This speech by Lagarde is primarily a geopolitical and trade policy address focused on global economic cooperation and protectionism risks; it contains virtually no direct discussion of monetary policy stance, inflation targeting, interest rate decisions, or labor market management—the core domains of central bank communication. While she references central banks' role as 'pillars of international cooperation' and delivering 'stability-oriented policies,' these are generic statements without concrete monetary policy signals regarding restrictiveness, accommodation, or rate path expectations. The speech predates or is disconnected from specific ECB policy decisions and contains no forward guidance on policy normalization or adjustment.", "st": 0.0}], "2025-06-09": [{"sp": "Frank Elderson", "rs": "연설은 중앙은행의 통화정책 구체적 방향성이나 인플레·성장·고용에 대한 평가를 담지 않으며, 법치주의와 제도적 독립성의 헌법적 중요성을 철학·법학적으로 논하는 내용으로 통화정책 스탠스 판단을 위한 경제 신호가 거의 없음.", "st": 0.0}], "2025-06-07": [{"sp": "Christine Lagarde", "rs": "연설은 해양 생태계, 기후변화, 적응 재정에 관한 환경·사회적 주제에 집중하며, 통화정책 스탠스(인상/인하, 금리 경로, 물가 목표 달성 방향)에 대한 직접적 언급이 전혀 없어 금융통화정책 평가 근거가 극히 빈약함.", "st": 0.0}], "2025-05-26": [{"sp": "Christine Lagarde", "rs": "연설은 유로의 국제적 역할 강화를 위한 거시경제 구조 개혁(자본시장, 생산성, 안전자산)에 중점을 두었으나, 직접적인 통화정책 신호나 인플레·성장·기금정책 경로에 대한 명시적 언급이 거의 없으며, 지정학·제도 논의가 주를 이루어 통화정책 스탠스 판단 근거가 빈약함.", "st": -0.2}], "2025-05-22": [{"sp": "Frank Elderson", "rs": "이 연설은 생물다양성과 금융안정성의 연관성에 관한 감독 정책 연설로, 통화정책 기조(금리 인상/인하)나 인플레이션·고용 전망에 대한 직접적 언급이 전혀 없으며, ECB의 감독 역할과 자연자본 리스크 평가에만 집중되어 있어 통화정책 입장 평가 불가능.", "st": 0.0}], "2025-05-16": [{"sp": "Philip R. Lane", "rs": "Lane's speech is primarily methodological ) despite gloomy macroeconomic outlook—the speech is primarily geopolitical-economic analysis rather than direct policy signaling.", "st": -0.15}], "2025-04-28": [{"sp": "Luis de Guindos", "rs": "ECB signals easing cycle underway (175bp cuts, data-dependent approach) with inflation on track to target, but acknowledges growth headwinds from trade uncertainty and geopolitical risks; tone is cautiously dovish with modest support for continued policy accommodation rather than hawkish tightening, though inflation risks remain balanced.", "st": -0.45}], "2025-04-25": [{"sp": "Christine Lagarde", "rs": "ECB maintains cautiously easing stance after April 25bp cut, emphasizing disinflation on track and data-dependency amid trade headwinds; inflation well-controlled toward 2% target but growth risks elevated, warranting flexibility rather than committed tightening path.", "st": -0.8}], "2025-04-08": [{"sp": "Piero Cipollone", "rs": "This speech focuses entirely on digital currency infrastructure and European financial autonomy rather than monetary policy stance, inflation outlook, or labor market conditions; no monetary policy signals (rate path, tightening/easing) or economic growth/inflation assessments are present.", "st": 0.0}], "2025-04-03": [{"sp": "Luis de Guindos", "rs": "Speech emphasizes inflation control on track (disinflation narrative, 2% target attainment) with modest upside risk from trade/geopolitical shocks, but dominates with downward growth revisions (0.9% 2025), weak exports/investment, and repeated calls for 'prudence' and 'data-dependent' stance—signaling readiness to pause/cut rather than tighten, though framed cautiously within high uncertainty context.", "st": -0.3}], "2025-04-02": [{"sp": "Christine Lagarde", "rs": "연설은 주로 지정학적 변화, 유럽의 경쟁력, 구조적 개혁 필요성을 다루며 직접적인 통화정책 신호(금리 인상/인하, 인플레 우려, 정책 경로)는 거의 없고, 성장 둔화와 투자 부진에 대한 우려만 암시적으로 드러남.", "st": -0.2}], "2025-04-01": [{"sp": "Christine Lagarde", "rs": "This is a technology/structural policy speech with mi  reducing confidence slightly due to balancing acts and nuanced positions.", "st": 0.65}, {"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals cautious easing with balanced risks: inflation progressing toward 2% target (downside inflation tilt) and labor market normalized but cooling (downside labor concern), justifying recent 75bps cuts and further easing 'over time' toward neutral—yet emphasizes data dependence and willingness to pause if inflation stalls, avoiding strong dovish commitments.", "st": -0.25}], "2024-11-14": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals cautious easing (25bp cut already taken, more possible but data-dependent, 'not in a hurry') with inflation nearly controlled but 'not there yet' and labor market normalized from overheated state; balanced risks language prevents strong hawkish reading despite solid growth, positioning for gradual further cuts while watching core housing inflation and maintaining optionality.", "st": -0.25}, {"sp": "Governor Adriana D. Kugler", "rs": "Speech primarily addresses theoretical foundations of central bank independence and credibility rather than current policy stance; however, implicit signals suggest moderate concern about inflation persistence (credibility discussion, anchoring focus) but acknowledgment of post-inflation easing already underway; dual-mandate framework emphasizes employment alongside price stability, softening hawkish tone; modest policy-easing signals appear through mention of most central banks initiating easing cycles despite inflation above target.", "st": -0.1}], "2024-10-14": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals hawkish-leaning caution: economy stronger than expected (3.2% GDI, strong labor demand), inflation uptick disappointing despite recent progress, and recent data (hot CPI, strong jobs, high GDP forecasts) warrant slower rate-cut pace than September; however, baseline remains gradual easing toward neutral 3.4% by end-2025, reflecting balanced risks rather than aggressive tightening or imminent easing.", "st": 0.75}], "2024-10-10": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook's speech focuses primarily on entrepreneurship, women in economics, and her personal story rather than monetary policy stances. While she discusses labor market dynamics and productivity gains from entrepreneurship as they relate to the Fed's dual mandate, she provides no direct guidance on inflation concerns, policy rate trajectory, or restrictive/accommodative stance. The modest growth_labor score reflects acknowledgment of strong job creation from new businesses, but lack of explicit policy signaling makes confidence low.", "st": 0.2}], "2024-10-09": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals disinflation progress (PCE 2.2%, core 2.7%) and labor market cooling (4.1% unemployment, 186K jobs/month), indicating the Fed's restrictive stance has worked; risks are now balanced between inflation and employment; modest dovish tilt emerges as he acknowledges employment risks rising while inflation risks diminish, though he stops short of explicit rate-cut guidance.", "st": -1.0}], "2024-10-08": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals disinflation progress and labor market cooling that justify recent 50bp cut; inflation now 2.2% PCE with restrictive stance having worked, risks to employment risen while inflation risks diminished, indicating gradual policy recalibration from restrictive to neutral—not yet accommodative, but trajectory is easing.", "st": -0.3}, {"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals disinflation progress justifying recent 50bp cut and further easing, but emphasizes data-dependency and readiness to slow normalization if inflation doesn't sustain 2% trajectory; acknowledges resilient labor market and cooling warranting balanced dual-mandate focus rather than continued restrictive stance, positioning policy in transition from restrictive to neutral rather than accommodative extremes.", "st": -0.3}], "2024-10-01": [{"sp": "Governor Lisa D. Cook", "rs": "Gov. Cook emphasizes AI's potential to boost long-term productivity and constrain inflation, signaling cautiously optimistic growth outlook with modest near-term labor disruption; however, she stresses uncertainty and 'long and variable lags' in realizing productivity effects, avoiding explicit policy rate guidance while implicitly suggesting patient monitoring over urgent tightening—a mixed moderate-dovish lean on policy with modest growth optimism tempered by implementation uncertainty.", "st": -0.6}], "2024-09-30": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals completed restrictive cycle with confidence in disinflation trajectory and balanced risks, justifying the 50bp rate cut; labor market cooling is acknowledged as appropriate and not requiring further deterioration; forward guidance toward neutral stance reflects shift from inflation-fighting to growth-maintenance mode, characterizing a moderate easing bias rather than hawkish hold.", "st": -1.05}, {"sp": "Governor Michelle W. Bowman", "rs": "Bowman adopts a hawkish stance by dissenting against the 50bp cut (preferred 25bp), emphasizing persistent core inflation at 2.7% (well above 2%), strong economic growth and labor demand, and risks of reigniting inflation through overly accommodative policy; while acknowledging recent progress and labor market cooling, she maintains vigilance on price stability and cautions against premature easing—signaling preference for measured, restrictive-leaning recalibration rather than aggressive rate cuts.", "st": 1.05}], "2024-09-26": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals clear easing bias: she explicitly supported the recent 50bp rate cut, emphasizes diminished inflation risks and elevated employment risks, notes labor market cooling and unemployment rising, and discusses supporting growth amid normalized inflation—all W. Bowman", "rs": "Governor Bowman dissents in favor of a more gradual rate cut (25bp vs 50bp), signaling hawkish concern that inflation at 2.5% core PCE has not been sufficiently tamed; she explicitly warns against premature victory declaration and advocates 'measured pace' rather than aggressive easing, reflecting persistent inflation vigilance while acknowledging labor market strength and some disinflation progress.", "st": 0.9}], "2024-09-10": [{"sp": "Governor Michelle W. Bowman", "rs": "이 연설은 연방준비제도 금융감독 및 자본 규제 정책(스트레스 테스트)에 관한 것으로, 통화정책의 금리 결정, 인플레이션 목표, 경제 성장·고용 정책과는 무관한 내용입니다.", "st": 0.0}, {"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "This speech focuses on prudential bank capital regulation and supervisory policy, not monetary policy. While it mentions economic activity and lending capacity, it contains no direct signals about inflation outlook, interest rate policy, or monetary accommodation—the core concerns of monetary policy analysis. The negative growth_labor score reflects language about potential mortgage affordability impacts and retail credit availability concerns, but this is regulatory, not monetary policy stance.", "st": -0.2}], "2024-09-06": [{"sp": "Governor Christopher J. Waller", "rs": "Governor Waller delivers a clear accommodative signal: inflation is on track to 2% with broad-based disinflation (core PCE 2.7% 12m, 1.7% 3m annualized), the labor market is moderating but not deteriorating, and he explicitly calls for rate cuts beginning at the next FOMC meeting with openness to consecutive cuts if data warrant—marking a decisive shift from the prior restrictive stance toward supporting employment while maintaining price stability near target.", "st": -1.6}], "2024-08-23": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals clear pivot toward easing: inflation 'much closer' to 2% objective with 'good reason to think' economy reaches target while maintaining strong labor market; labor market 'no longer overheated' with 'cooling unmistakable' and unemployment risen to 4.3%; explicitly states 'time has come for policy to adjust' with rate cuts ahead, though phrased as data-dependent rather than imminent—moderately dovish rather than aggressively accommodative, justifying -1.5 on policy_path rather than -2.", "st": -1.25}], "2024-08-20": [{"sp": "Governor Michelle W. Bowman", "rs": "Bowman signals cautious hawkishness: inflation remains elevated with upside risks from geopolitical/fiscal/immigration factors, justifying continued hold; labor market loosening provides room for future cuts but data challenges warrant patience; she emphasizes price stability primacy and resistance to overreaction, supporting gradual rather than immediate easing.", "st": 0.45}], "2024-08-19": [{"sp": "Governor Christopher J. Waller", "rs": "연설은 금융·통화 이론 워크숍 개회사로서 통화정책 스탠스나 인플레이션·성장 평가를 직접 다루지 않으며, 금융시스템 연구의 중요성과 혁신 기술 논의에만 집중하여 현재의 정책 입장을 판단할 근거가 매우 부족함.", "st": 0.0}], "2024-08-10": [{"sp": "Governor Michelle W. Bowman", "rs": "Bowman signals cautious readiness to cut rates if inflation progresses sustainably toward 2%, but emphasizes patience, acknowledges multiple upside inflation risks (supply normalization, geopolitical shocks, fiscal stimulus, housing services), and notes wage growth remains elevated relative to productivity—positioning as weak hawk favoring rate cuts only with stronger disinflation evidence, not imminent easingрезистор.", "st": 0.65}], "2024-07-24": [{"sp": "Governor Michelle W. Bowman", "rs": "이 연설은 지역 사회 개발 및 교육·고용 역량 강화 프로그램 홍보에 초점을 맞추고 있으며, 통화정책의 방향성, 인플레이션 우려, 금리 경로에 대한 직접적 언급이 거의 없어 통화정책 입장을 판단하기 어렵습니다.", "st": 0.0}], "2024-07-17": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals cautious optimism on disinflation progress (May-June CPI data 'very good news', core PCE moderating) but insists on 'a bit more evidence' before cutting, leaving policy path modestly dovish rather than hawkish; labor market achieving 'sweet spot' balance reduces overheating concerns; he frames three scenarios with highest probability on scenarios 1-2 ('time to lower policy rate is drawing closer') but emphasizes data-dependence and inflation credibility risks, yielding mixed but leaning-dovish tone without explicit rate-cut commitment.", "st": -0.65}], "2024-07-16": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler's speech is primarily focused on methodological issues in economic measurement and data collection rather than articulating a monetary policy stance; she discusses both inflation (housing services) and labor market topics but with no directional bias toward tightening or easing, and expresses no preference regarding the policy rate path, warranting neutral scores across all axes and low confidence.", "st": 0.0}], "2024-07-10": [{"sp": "Governor Lisa D. Cook", "rs": "Cook signals ongoing disinflation with global inflation components declining and baseline forecast for gradual return to target without much further unemployment rise, justifying slight easing bias on policy_path; inflation concerns receding but not absent given monitoring language; labor market cooling but still firm suggests neutral stance on growth_labor; high confidence reflects clear focus on monetary policy mechanisms and consistent dovish-leaning tone throughout.", "st": -0.65}, {"sp": "Governor Michelle W. Bowman", "rs": "연설은 Fed Listens 행사 개최 목적과 경제 대화의 가치에 집중하며, 통화정책 방향성·인플레이션 우려·금리 조정 신호 등 실질적 정책 스탠스를 직접 표현하지 않아 중립적이고 통화정책 판단 근거가 극히 제한적임.", "st": 0.0}], "2024-07-09": [{"sp": "Governor Michelle W. Bowman", "rs": "This speech focuses entirely on financial inclusion initiatives, consumer protections, and community development—topics unrelated to monetary policy stance, inflation concerns, or interest rate decisions. No mention of inflation trends, labor market conditions, rate trajectory, or forward guidance on policy normalization. The speech reflects DCCA's regulatory and community affairs mission rather than monetary policy signaling.", "st": 0.0}, {"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "This speech by Vice Chair Barr focuses entirely on financial inclusion, banking regulation, and consumer protection—topics completely divorced from monetary policy stances on inflation, employment, or interest rate paths. No discussion of price stability, labor market dynamics, or policy rate adjustments appears in the text.", "st": 0.0}], "2024-06-26": [{"sp": "Governor Michelle W. Bowman", "rs": "Bowman signals a hawkish stance with emphasis on 'upside risks to inflation,' 'elevated for some time,' and 'not yet appropriate to lower' rates despite restrictive policy already in place; she acknowledges moderated growth and tight labor markets but prioritizes inflation control, suggesting rates may need to rise further if progress stalls, warranting +1.5 on policy_path, +1.0 on inflation concerns, and -0.5 on growth_labor given softening momentum.", "st": 0.95}], "2024-06-25": [{"sp": "Governor Michelle W. Bowman", "rs": "연설 전체가 사이버보안, 랜섬웨어, 제3자 리스크 관리 등 운영 리스크에 집중하며 통화정책, 인플레이션, 성장·고용, 금리 경로에 대한 어떠한 직접적 언급도 없어 통화정책 애널리시스 대상이 아님.", "st": 0.0}, {"sp": "Governor Lisa D. Cook", "rs": "Cook signals hawkish-leaning patience: inflation progress acknowledged but slowing worries her (+0.5), labor market normalized rather than softening (0.0), and while current policy is restrictive and she emphasizes data-dependency before easing, she explicitly states 'at some point it will be appropriate to reduce restriction'—tempering pure tightening signals (+0.5 rather than +1.5). Tone is measured and conditional rather than urgently restrictive, but no clear easing bias.", "st": 0.4}, {"sp": "Governor Michelle W. Bowman", "rs": "Bowman signals hawkish caution on inflation (elevated PCE, upside risks from fiscal/immigration/geopolitics, wage growth above 2% goal) and maintains restrictive policy stance ('sufficiently restrictive,' 'hold at current level for some time,' willing to hike if inflation stalls), but tempers with acknowledgment of moderating growth and eventual path-dependent rate cuts—positioning between persistent inflation concern and growth moderation without committing to imminent easing.", "st": 1.05}], "2024-06-24": [{"sp": "Governor Christopher J. Waller", "rs": "This is an opening remarks speech focused on the International Journal of Central Banking conference organization and journal history, with no direct monetary policy stance, inflation assessment, labor market view, or policy path signals—merely contextual framing of research topics to be discussed by other scholars.", "st": 0.0}], "2024-06-18": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals cautious optimism on disinflation trajectory with inflation still elevated but trending down; acknowledges current policy restrictiveness is appropriate and need for 'more progress' before easing (hawkish on policy path); labor market showing gradual cooling with supply-demand rebalancing (neutral-dovish on growth_labor); overall tone is data-dependent but leans toward maintaining restrictive stance longer rather than near-term cuts, despite near-term easing possibility by year-end.", "st": 0.55}], "2024-06-17": [{"sp": "Governor Lisa D. Cook", "rs": "이 연설은 마셜 스칼라십 수상 기념식 축사로, 개인의 학창시절 경험, 영미 문화 교류, 중앙은행 간 협력의 중요성을 다루고 있으나 통화정책 스탠스, 인플레이션 우려, 금리 경로 등 구체적인 금융통화정책 신호를 담지 않아 평가 대상이 아님.", "st": 0.0}, {"sp": "Governor Michelle W. Bowman", "rs": "이 연설은 금융규제자(연방준비제도 이사)의 금융혁신과 규제 프레임워크에 관한 기조발언으로, 통화정책(금리·인상·완화 신호)과는 무관한 은행감독·규제 정책 중심이므로 물가·성장·정책 방향성 축에 대해 판단할 근거가 전무하다.", "st": 0.0}], "2024-06-14": [{"sp": "Governor Lisa D. Cook", "rs": "This speech is a celebratory address about the 50-year history of the AEA Summer Program with no substantive discussion of monetary policy, inflation, labor markets, or policy path decisions.", "st": 0.0}], "2024-05-28": [{"sp": "Governor Michelle W. Bowman", "rs": "Bowman emphasizes maintaining restrictive monetary policy to combat inflation (explicit 2% goal focus) and continuing balance sheet reduction despite recent slowdown decision, signaling hawkish commitment; however, she avoids overheating language and acknowledges economic strength rather than weakness, yielding moderate rather than strong hawkish positioning on inflation and growth axes.", "st": 0.8}], "2024-05-24": [{"sp": "Governor Christopher J. Waller", "rs": "연설은 순수 학술적 주제(자연실질금리의 장기 추세)에 집중하며, 현재 통화정책 스탠스, 인플레이션 우려, 고용 상황, 정책 경로에 대한 직접적 신호가 거의 없고, 기술적 논증만 제시해 정책 평가 근거가 빈약함.", "st": 0.0}], "2024-05-21": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals hawkish caution: inflation concerns have eased but remain elevated (3.6% core CPI), economic cooling is evident, yet he explicitly rules out rate hikes and waits for more disinflationary data before easing—positioning at a restrictive hold with a data-dependent tilt toward eventual cuts, not immediate action.", "st": 0.65}], "2024-05-20": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson maintains a hawkish stance: rates are explicitly in 'restrictive territory,' no rate cuts expected until greater confidence on 2% inflation path (policy_path:+1.0), inflation remains above 2% despite easing (inflation:+1.0), and labor market is solid but coming into balance (growth_labor:+0.5). Speech tone is consistent on maintaining restrictive policy while acknowledging progress, with clear signals against premature easing.", "st": 0.9}, {"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "연설의 통화정책 부분에서 Barr는 현재 제약적 기조(restrictive policy)를 강조하며 추가 시간 필요를 언급했으나, 인플레가 여전히 2% 목표 이하로 있고 성장·고용이 견조한 상황에서 '견고한 입장 유지'라는 중도적 톤을 유지했기에 약한 매파 신호로 평가; 나머지 절대 다수는 은행 감독 규제 프레임워크로 통화정책 직접 언급이 제한적이어서 신뢰도는 중간 이하.", "st": 0.5}, {"sp": "Governor Christopher J. Waller", "rs": "This speech focuses entirely on the international role of the dollar, geopolitics, and cross-border payment systems with no direct discussion of inflation outlook, labor market conditions, or monetary policy stance (rate paths, tightening/easing signals), making it essentially non-informative for assessing current monetary policy orientation.", "st": 0.0}], "2024-05-18": [{"sp": "Governor Adriana D. Kugler", "rs": "이 연설은 졸업식 축사로서 개인의 경력 경험담과 공공정책 경력의 중요성을 강조하는 내용이며, 통화정책·금리·물가·금융정책 등 중앙은행의 정책 스탠스를 직접 다루는 내용이 전혀 없어 정책 신호 판단이 불가능함.", "st": 0.0}], "2024-05-15": [{"sp": "Governor Michelle W. Bowman", "rs": "This speech focuses entirely on financial technology regulation and banking innovation policy, with virtually no discussion of monetary policy, inflation dynamics, labor markets, interest rate paths, or economic conditions that would inform interest rate decisions. The speaker addresses regulatory architecture for fintech rather than macroeconomic monetary policy stance.", "st": 0.0}], "2024-05-14": [{"sp": "Governor Lisa D. Cook", "rs": "Speech is entirely focused on community development finance institutions and their role in serving underserved populations; contains virtually no discussion of monetary policy stance, inflation outlook, labor market conditions, or interest rate path decisions that would inform bond market positioning.", "st": 0.0}], "2024-05-13": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "This speech is a historical overview of Fed communication evolution and best practices, not a forward-looking monetary policy stance; it contains no substantive signals on current inflation concerns, labor market assessment, or policy direction—Vice Chair Jefferson deliberately avoids committing to any hawkish or dovish position on policy path.", "st": 0.0}], "2024-05-10": [{"sp": "Governor Michelle W. Bowman", "rs": "Speech focuses primarily on financial stability, banking regulation, and supervisory frameworks with minimal direct commentary on monetary policy stance, inflation outlook, labor market conditions, or future policy rate trajectory; no clear hawkish or dovish signals regarding rate path or economic assessment.", "st": 0.0}], "2024-05-08": [{"sp": "Governor Lisa D. Cook", "rs": "This speech focuses exclusively on financial stability assessment and regulatory supervision with no discussion of monetary policy stance, inflation concerns, labor market conditions, or interest rate path decisions. The speaker does not address current or future policy rates, inflation trajectory, or growth outlooks that would inform rate decisions.", "st": 0.0}], "2024-05-04": [{"sp": "Governor Lisa D. Cook", "rs": "This is a commencement address focused on personal biography, family history, and educational inspiration with no substantive discussion of monetary policy, inflation, labor markets, or central bank policy decisions.", "st": 0.0}], "2024-05-03": [{"sp": "Governor Michelle W. Bowman", "rs": "Bowman signals hawkish caution: characterizes policy as 'restrictive' and explicitly states willingness to raise rates if inflation progress stalls or reverses, cites multiple upside inflation risks (supply-side uncertainty, geopolitical spillovers, fiscal stimulus, services inflation persistence, wage pressures), yet acknowledges strong growth and tight labor market; tone is data-dependent but tilted toward inflation vigilance rather than near-term easing.", "st": 1.15}], "2024-04-18": [{"sp": "Governor Michelle W. Bowman", "rs": "연설은 은행감독·리스크관리·우발자금조달계획 등 금융안정성에 집중하며, 통화정책(인상/인하, 인플레이션 방향성, 성장·고용)에 대한 직접적 언급이 전무하여 금리결정 스탠스를 판단할 근거가 부족함.", "st": 0.0}], "2024-04-16": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals cautious hawkishness: inflation progress acknowledged but not yet at 2% target, recent data 'higher than expected' on both jobs and inflation, explicit commitment to 'restrictive stance for longer' if persistence continues, yet framed within uncertainty and gradualism framework rather than aggressive tightening, reflecting hawkish tilt (+1 across all three axes) tempered by intellectual humility about policy conduct under uncertainty.", "st": 1.0}], "2024-04-05": [{"sp": "Governor Michelle W. Bowman", "rs": "Governor Bowman acknowledges inflation underestimation, validates the rapid tightening already executed (rates now in restrictive territory at 5.25%), and emphasizes past accommodation was excessive—signaling hawkish reassessment of inflation persistence and policy normalization, though she does not advocate further immediate action, making her stance moderately hawkish rather than aggressively so.", "st": 0.9}], "2024-04-04": [{"sp": "Governor Adriana D. Kugler", "rs": "This speech is a non-monetary policy address focused on diversity in economics and research methodology using personal examples; it contains no discussion of inflation, labor market conditions, growth outlook, or monetary policy stance, making it essentially void of content relevant to central banking policy assessment.", "st": 0.0}], "2024-04-03": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler delivers a moderately dovish assessment: inflation progress is substantial (PCE 2.5%, core 2.8%) with disinflation 'fastest since early 1980s', labor supply improved significantly, and she explicitly expects 'some lowering of the policy rate this year'—signaling rate cuts are appropriate if current trends continue. However, she acknowledges upside inflation risks (commodity shocks, stronger consumption) and downside growth risks (credit delinquencies, labor market vulnerability), and emphasizes policy remains 'currently restrictive,' tempering full dovish enthusiasm. The tone is optimistic about soft-landing prospects rather than aggressively accommodative.", "st": -0.8}, {"sp": "Chair Jerome H. Powell", "rs": "Powell signals tentative disinflation progress with near-term rate pause, acknowledging inflation still above target but trending down; economy remains strong with solid growth and rebalancing labor market; monetary policy stance is data-dependent and patience-focused rather than hawkish, with rate cuts likely later in 2024 if inflation continues declining, suggesting a gradually accommodative pivot beginning to emerge despite maintaining restrictive bias through the near term.", "st": 0.1}], "2024-04-02": [{"sp": "Governor Michelle W. Bowman", "rs": "This speech focuses on banking system structure, regulatory processes, and M&A policy—not monetary policy, inflation outlook, or interest rate decisions. No direct signals on restrictive vs. accommodative stance, inflation concerns, or labor market conditions are present.", "st": 0.0}], "2024-03-27": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals hawkish patience: inflation progress stalled with recent hot data (core PCE, CPI), robust labor market (275k jobs, broad-based), strong GDP growth (2-2.1%), yet explicitly rejects rate cuts until multiple months of better inflation data materialize; holding current restrictive 5.25-5.5% stance longer than previously thought, with asymmetric risk favoring delay over premature easing—classic data-dependent hawkish hold.", "st": 1.4}], "2024-03-25": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals inflation progress (PCE 2.4%, core 2.8%) and strong labor market near historical lows, justifying shift from 2022-23 tightening toward cautious easing, but emphasizes gradualism and risks remain—a moderate hawkish-to-neutral stance reflecting balanced mandate recovery rather than imminent rate cuts.", "st": 0.75}], "2024-03-05": [{"sp": "Governor Michelle W. Bowman", "rs": "This speech is exclusively focused on bank regulatory framework, supervisory tailoring, and prudential standards—entirely disconnected from monetary policy, inflation assessment, labor market analysis, or interest rate paths that define central bank communications.", "st": 0.0}], "2024-03-01": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler presents a nuanced account emphasizing supply-driven inflation (not demand-driven), successful disinflation without severe employment costs, and anchored expectations via credible FOMC communication; inflation concerns remain moderate (+1) as she notes ongoing vigilance on price stability, growth-labor is neutral (0) as both remain robust, and policy_path is mildly hawkish (+0.5) reflecting past tightening and resolve to maintain price stability, though she avoids explicit forward guidance on further rate moves, yielding high confidence (0.75) in the analysis's consistency with her policy-focused remarks.", "st": 0.55}, {"sp": "Governor Christopher J. Waller", "rs": "Waller presents a technical, balanced discussion of QT mechanics and emphasizes credible commitment to normalize the balance sheet without major inflation concerns, but avoids strong forward guidance on rate policy, resulting in modestly hawkish balance sheet tone offset by neutral stance on near-term economic conditions and policy rate trajectory.", "st": 0.4}], "2024-02-27": [{"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "이 연설은 금융 안정성과 감독 관점에서 상대방 신용 위험 관리를 다루며, 통화정책의 기조·인상/인하 신호·인플레이션 우려·성장 전망 등 통화정책 스탠스와는 직접적 관련이 없음.", "st": 0.0}], "2024-02-22": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals cautious hawkishness: acknowledges strong growth/employment but emphasizes upside inflation risks (January CPI surprise, sticky housing/services costs) and advocates patience on rate cuts despite expecting easing later in 2024; robust economic data and inflation concerns outweigh recession risks, supporting delayed policy normalization.", "st": 1.4}, {"sp": "Governor Lisa D. Cook", "rs": "Cook signals declining inflation concerns (PCE at 2.6%, core services easing, expectations anchored) and labor market normalization (unemployment 3.7%, wage growth cooling, job openings declining), but maintains a cautious stance on rate cuts, emphasizing current policy remains restrictive and need for greater confidence in sustained disinflation before easing—reflecting a gradual hawkish-to-neutral transition rather than immediate accommodation.", "st": -0.25}, {"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals inflation is largely contained (PCE at 2.
