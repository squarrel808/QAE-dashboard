ge) offsetting gradual disinflation progress, but emphasizes patience and flexibility ('wait and see') rather than urgent tightening; labor market described as healthy but tariffs risk job losses for low-income workers, creating mixed growth-employment signals; speech is primarily community development focused with limited explicit monetary policy stance, reducing confidence in call direction.", "st": -0.2}], "2025-06-24": [{"sp": "Governor Michael S. Barr", "rs": "Barr acknowledges ongoing disinflation but expects tariff-driven inflation rise with second-round effects (inflationary signal), simultaneously warns of economic slowdown and rising unemployment (deflationary growth concern), and adopts patient 'wait and see' stance indicating policy hold—mixed signals with modest hawkish tilt on inflation offset by dovish labor market concern and neutral policy guidance.", "st": 0.2}], "2025-06-23": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler's speech is primarily procedural and meta-communicative about the 2025 framework review process rather than substantive monetary policy guidance; it contains no direct signals on inflation concerns, labor market assessment, or policy path direction, making it unsuitable for meaningful stance assessment.", "st": 0.0}, {"sp": "Vice Chair for Supervision Michelle W. Bowman", "rs": "Bowman signals readiness to cut rates soon due to inflation moderating toward target and emerging labor market fragility, while acknowledging some tariff-related upside risks but viewing them as contained and temporary; inflation concern is moderate (+0.5) as progress is evident but tariff risks noted, labor growth is weak (-1) given signs of softening and slowing hiring, and policy path is accommodative (-1.5) with explicit support for rate cuts at the next meeting to support employment.", "st": -0.8}, {"sp": "Governor Christopher J. Waller", "rs": "연설은 IJCB 학술지 편집자로서의 역할 강조 및 컨퍼런스 개회사에 불과하며, 현재 통화정책 스탠스나 향후 정책 방향에 대한 직접적인 언급이 전무하고 물가·성장·정책경로 관련 명확한 신호가 없음.", "st": 0.0}], "2025-06-05": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals clear concern about inflation (tariffs, escalating goods prices, rising near-term expectations) while acknowledging labor market resilience with emerging softness; she advocates holding rates steady despite upside inflation risks, positioning as cautiously hawkish—maintaining restrictive stance rather than easing, reflecting elevated inflation vigilance tempered by incipient growth/employment moderation.", "st": 0.85}], "2025-06-04": [{"sp": "Governor Lisa D. Cook", "rs": "연설은 주로 프레임워크 재검토 공청회 개최 취지 설명과 지역사회 의견 수렴에 집중하며, 현재의 통화정책 스탠스나 물가·성장·정책 방향에 대한 직접적인 신호를 거의 포함하지 않음.", "st": 0.0}], "2025-06-03": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals concern about upside inflation risks from trade policy changes while acknowledging labor market resilience and intentional policy flexibility; maintains neutral stance on near-term rate path despite inflation above target and acknowledged uncertainty, reflecting a cautious-but-not-yet-hawkish posture focused on keeping expectations anchored rather than signaling imminent tightening or easing.", "st": 0.3}], "2025-06-02": [{"sp": "Chair Jerome H. Powell", "rs": "This is a commemorative speech celebrating the 75th anniversary of the Fed's Division of International Finance, focusing on historical context and institutional achievements rather than current monetary policy stance, inflation assessment, or policy path guidance.", "st": 0.0}], "2025-06-01": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals upside inflation risks from tariffs (temporary but real) while noting labor market resilience despite tariff-induced slowdown risks; he explicitly argues tariff inflation won't persist like 2021-22, implying no urgent tightening need, positioning policy as data-dependent and neutral on the path forward.", "st": 0.2}], "2025-05-29": [{"sp": "Governor Adriana D. Kugler", "rs": "연설은 주로 학술 컨퍼런스 격려와 금융안정 리스크 요인(CRE, 국제자산 지위 변화, 무역 노출)에 대한 연구 아젠다 제시에 집중하며, 현재의 인플레이션 상황, 성장·고용 상태, 통화정책 경로에 대한 직접적 발언이 없어 통화정책 스탠스를 판단할 근거가 불충분함.", "st": 0.0}], "2025-05-23": [{"sp": "Governor Lisa D. Cook", "rs": "연설은 금융안정성 프레임워크와 4월 변동성 평가에 집중하며 통화정책 방향을 직접 제시하지 않음; 인플레 관련 '상품 관세 발표 후 인플레 전망 우려' 언급하나 부수적이며, 경제성장·고용은 'solid shape'로 현재 견조하되 불확실성으로 인한 둔화 위험 제시, 정책경로는 금융안정 정책(resilience 강화)만 언급되고 금리 방향성 명확하지 않아 중립.", "st": -0.2}], "2025-05-19": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "연설은 중앙은행의 유동성 공급 메커니즘과 운영 절차에 관한 기술적 설명에 집중하며, 인플레이션·성장·고용·정책 방향에 대한 직접적인 통화정책 신호가 전혀 없어 평가 대상이 아님.", "st": 0.0}], "2025-05-15": [{"sp": "Governor Michael S. Barr", "rs": "연설은 소상공업 지원에 중점을 두며, 통화정책 입장은 부수적임. 거시경제 평가에서 '견고한 성장, 낮은 실업, 인플레 하락' 긍정 신호와 '무역정책 불확실성, 공급망 위험으로 성장둔화·인플레 상승 가능' 부정 신호가 혼재되어 있으나, 정책 방향이나 금리 경로에 대한 명시적 언급 부재로 신뢰도 낮음.", "st": 0.25}, {"sp": "Chair Jerome H. Powell", "rs": "Powell emphasizes framework reassessment and inflation anchoring rather than near-term policy direction; acknowledges successful disinflation but signals caution on future supply shocks and higher real rates without committing to rate path, yielding modest hawkish tilt on inflation but neutral on growth and policy stance given the focus is structural review rather than immediate tightening/easing signals.", "st": 0.15}], "2025-05-14": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals hawkish caution on inflation (tariff risks, upside uncertainty) while acknowledging labor market strength and downside growth risks from policy uncertainty; current policy held at restrictive stance with balanced readiness to respond both ways, reflecting genuine two-sided mandate tension rather than clear easing or tightening bias.", "st": 0.55}, {"sp": "Governor Christopher J. Waller", "rs": "이 연설은 중앙은행 경제 연구의 역사와 방법론에 관한 학술적 강연으로, 현재의 통화정책 스탠스나 인플레·성장·정책 경로에 대한 직접적인 신호를 담고 있지 않습니다. 단편적 사례(볼커, 2008년 금융위기)만 언급되고 현재 경제 상황이나 정책 방향성에 대한 명확한 입장이 제시되지 않아 신뢰도가 매우 낮습니다.", "st": 0.0}], "2025-05-12": [{"sp": "Governor Adriana D. Kugler", "rs": "Kugler signals hawkish concern on inflation (upside risks, tariffs as supply shock, expectations uptick) and restrictive policy maintenance, but acknowledges growth slowdown and uncertainty-driven demand weakness offsetting some upside; modest net hawkish tilt reflecting dual-mandate tension rather than clear rate-hike signaling.", "st": 0.6}], "2025-05-09": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook emphasizes productivity as a moderating force on inflation while acknowledging near-term downside risks from trade policy uncertainty and tariff-induced investment delays, signaling cautious patience rather than clear hawkish or dovish commitment—productivity gains could reduce need for restrictive policy, but trade headwinds and need to anchor expectations suggest willingness to maintain higher rates, resulting in balanced but slightly hawkish lean.", "st": 0.5}, {"sp": "Governor Christopher J. Waller", "rs": "이 연설은 중앙은행 제도 설계와 독립성의 역사적·이론적 발전을 학술적으로 논하는 것으로, 현재의 구체적인 인플레이션 상황, 노동시장 상태, 또는 정책 방향성(인상/인하)에 대한 직접적인 통화정책 신호나 판단을 포함하지 않습니다.", "st": 0.0}, {"sp": "Governor Adriana D. Kugler", "rs": "Speech focuses primarily on conceptual/technical explanation of how to estimate maximum employment (u*) through multiple methodologies rather than signaling current monetary policy stance; no explicit signal on inflation concerns, growth assessment, or policy direction (tightening vs easing); cautious language ('judge labor market to be stable,' 'close to maximum employment') suggests neutral assessment; insufficient concrete policy guidance for direction determination.", "st": 0.0}, {"sp": "Governor Michael S. Barr", "rs": "연설의 핵심은 관세로 인한 인플레 상방압력과 성장 둔화 우려이나, 대부분은 AI의 장기 노동시장 영향에 집중되어 있고 현물 통화정책 스탠스는 '조정 준비' 수준으로 명확하지 않아 신뢰도 보통 수준; inflation +1(관세 상방압력 명시), growth_labor 0(강한 경제 시작점과 성장 둔화 우려 상쇄), policy_path +0.5(현금화 가능하지만 아직 어댑티브 톤).", "st": 0.55}], "2025-04-23": [{"sp": "Governor Christopher J. Waller", "rs": "연설은 통화정책 프레임워크 재검토의 배경으로 공개 협의 프로세스를 설명하는 행정·제도적 발언이며, 인플레이션, 금리 경로, 고용 전망에 대한 직접적인 정책 스탠스나 시그널이 전혀 포함되어 있지 않아 통화정책 방향성을 판단할 근거가 부족함.", "st": 0.0}], "2025-04-22": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals cautious restraint: inflation above target with upside risks from tariffs warrant holding rates steady (policy_path +0.5), labor market is stable but hiring has eased (growth_labor neutral at 0), and she explicitly commits to maintaining current policy if upside inflation risks persist, though she acknowledges transmission complexity and asymmetries without committing to future tightening (inflation +1.0 reflects concern about tariff-driven price pressures and above-target reading).", "st": 0.55}, {"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson emphasizes the post-GFC expansion's success with low inflation, strong employment gains across demographics, and wage growth benefiting lower earners—supportive of dual mandate achievement—but the speech is primarily academic/structural (on economic mobility) rather than forward-looking monetary policy guidance; no current restrictive or easing signals, making policy_path neutral.", "st": -0.1}], "2025-04-16": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals upside inflation concerns from tariffs while maintaining that the labor market is balanced and not inflationary; growth is slowing but positive; the Fed signals caution (waiting for clarity) rather than immediate tightening, suggesting a data-dependent, patient approach without aggressive policy adjustments in either direction.", "st": 0.7}], "2025-04-14": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals inflation concerns from large tariff scenario (1-2pp near-term spike) but views it as temporary/transitory despite 2021-22 precedent, expects significant growth slowdown and unemployment rise (to ~5%), and explicitly indicates willingness to cut rates if recession threatens, suggesting neutral-to-dovish tilt in policy response despite near-term inflation risks, though current stance remains restrictive pending data.", "st": 0.2}], "2025-04-07": [{"sp": "Governor Adriana D. Kugler", "rs": "이는 하버드 대학 경제학 강의로서 통화정책 스탠스를 직접 표명하지 않으며, 인플레이션 현상의 사후 분석과 이론적 모델링에만 초점을 맞추고 있어 정책 방향성을 판단하기에 충분한 근거가 부족함.", "st": 0.0}], "2025-04-04": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals concern about tariff-driven inflation risks and commits to anchoring expectations while acknowledging labor market stability and uncertain growth outlook; monetary policy tone is cautiously hawkish on inflation control but patient pending clarity on policy effects, consistent with a hold-and-assess posture rather than immediate action in either direction.", "st": 0.8}], "2025-04-03": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook acknowledges persistent above-target inflation (2.5% PCE, 2.8% core) and tariff-related upside risks while noting disinflation progress; labor market stabilized but solid, not overheating; FOMC holding rates steady (4.25-4.5%) with cautious forward guidance reflecting uncertainty, neither signaling imminent hikes nor cuts—a moderately hawkish tilt tempered by acknowledgment of slowing growth and policy uncertainty.", "st": 0.19}, {"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals cautious hawkishness: inflation still elevated with recent sideways momentum warrants holding a 'moderately restrictive' stance with no rush to cut, yet solid growth and stable labor market (4.1% unemployment, low layoffs) coupled with 'higher than usual uncertainty' about economic outlook—especially trade/fiscal policy risks—prevent strong hawkish positioning; tone is patient and data-dependent rather than urgently restrictive.", "st": 0.4}], "2025-04-02": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler emphasizes the Fed's past success in maintaining credible inflation control and anchored longer-term expectations, while acknowledging recent inflation and heightened sensitivity of households/firms to price pressures; she discusses how expectations influence current economic decisions but stops before articulating forward policy stance, leaving a mixed signal—credibility language suggests confidence in disinflationary path (accommodative undertone) yet focus on vigilance regarding expectations sensitivity and recent inflation experience suggests lingering caution, yielding a modest hawkish lean offset by the overall framing of stability achieved.", "st": -0.1}], "2025-03-25": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals concern about inflation reacceleration and rising expectations (especially tied to trade policy), justifying maintenance of restrictive policy rates, but labor market remains stable with solid job growth and low unemployment, resulting in a moderately hawkish stance tempered by data-dependent caution rather than explicit rate-hike signals.", "st": 0.65}], "2025-03-24": [{"sp": "Governor Michael S. Barr", "rs": "This speech is entirely focused on small business credit access, financial disclosure, and entrepreneurial support—topics completely unrelated to monetary policy, inflation dynamics, labor market conditions, or interest rate paths. Governor Barr makes no statements about inflation risks, labor market tightness, economic overheating, policy normalization, or future rate decisions. The speech contains zero monetary policy guidance or central bank stance signals.", "st": 0.0}], "2025-03-07": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals a data-dependent, flexible stance with no preset course: willing to maintain restraint if inflation stalls, but ready to ease if labor market weakens—reflecting modest hawkish tilt on inflation (2.6% core PCE, expectations uptick) balanced against solid growth/employment data and high uncertainty about new administration policies, warranting cautious near-term positioning rather than clear tightening or easing bias.", "st": 0.25}, {"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals concern about inflation via rising expectations and upside risks (goods, non-market services) despite balanced labor markets, supporting a hold on rates for now rather than near-term cuts, but stops short of explicit tightening given disinflation progress and labor stability.", "st": 0.55}, {"sp": "Governor Michelle W. Bowman", "rs": "Governor Bowman reflects on the 2022-2023 tightening cycle with acknowledgment that rate hikes successfully fought inflation, but emphasizes economy's resilience and labor market softening in 2023, while noting inflation progress allows future policy discussions to focus more on real activity—combining modest hawkish retrospective inflation assessment with current-time dovish labor market signals and neutral forward guidance posture.", "st": 0.05}], "2025-02-27": [{"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "연설은 금융혁신 감독 프레임워크에 관한 것으로, 통화정책(금리·통화량·경제 전망)과 무관하며 금융감독 정책만 다루고 있어 통화정책 스탠스 평가 불가능.", "st": 0.0}], "2025-02-25": [{"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "This speech focuses entirely on financial stability and crisis management principles from the March 2023 banking stress; it contains no substantive discussion of monetary policy stance, inflation outlook, labor market conditions, or the future path of interest rates, making it unsuitable for assessing the three monetary policy axes.", "st": 0.0}], "2025-02-21": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "연설은 통화정책 커뮤니케이션 메커니즘과 텍스트 분석 방법론에 관한 학술적 논의로, 인플레이션, 성장·고용, 정책 방향성에 대한 직접적인 입장 표명이 전무하며 순전히 커뮤니케이션 도구의 효율성과 시장 전달 메커니즘에만 집중하고 있어 현재 통화정책 스탠스를 판단할 근거가 부족함.", "st": 0.0}], "2025-02-20": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals persistent inflation concerns ('somewhat elevated,' 'upside risks remain,' '2.4% PCE well above 2% target') justifying continued restrictive policy, while acknowledging healthy but stable labor market (4% unemployment, 189k job gains) and moderately restrictive rate stance—a cautious hawkish lean reflecting data-dependent patience rather than aggressive tightening.", "st": 0.65}], "2025-02-19": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson acknowledges elevated inflation (2.4% vs 2% target) and slow recent progress, supporting cautious inflation concern; strong GDP (2.5%) and solid labor market (4% unemployment) support growth resilience; but his 100bp cuts last year plus explicit patience signal ('take our time') and characterization of policy as 'restrictive' (not accommodation needed yet) reflect a measured, data-dependent stance leaning slightly dovish relative to holding, rather than hawkish tightening signals.", "st": 0.0}], "2025-02-18": [{"sp": "Vice Chair for Supervision Michael S. Barr", "rs": "Speech focuses entirely on AI's macroeconomic scenarios and financial stability implications rather than current monetary policy stance; no explicit signals on inflation concerns, interest rates, or policy direction—purely analytical framework for long-term structural change with modest positive growth/labor tone but no hawkish or dovish monetary policy positioning.", "st": 0.1}], "2025-02-17": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals hawkish caution: acknowledges restrictive policy is warranted given inflation still above 2% target despite uneven progress, supports holding rates steady rather than cutting, but inflation concerns are moderated by residual seasonality hypothesis and labor market resilience, implying potential future cuts if data cooperates—a guarded pause rather than hawkish tightening.", "st": 0.75}], "2025-02-07": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler emphasizes sustained productivity gains and disinflationary momentum (supporting rate cuts), but acknowledges recent uneven inflation progress and uncertainty, tempering the dovish signal; growth and labor market remain solid without overheating concerns, justifying modestly accommodative stance." const NB = 0.15;
const BANKC  = {FED:'#6e1f1f', BOJ:'#b8860b', ECB:'#3a5a8c', BOE:'#7a4a6e'};   // 전체 모드 막대색(은행 구분)
const HAWK='#c0392b', DOVE='#1a7a4c', NEUT='#9aa0a6';   // 매파=red, 완화=green, 중립=gray

const sel = document.getElementById('country-filter');
const banks = Object.keys(DATA);
sel.innerHTML = '<option value="ALL">전체 (All)</option>' +
  banks.map(b=>`<option value="${b}">${DATA[b].label}</option>`).join('');

function wrap(s, w){
  const out=[]; let line='';
  for(const word of String(s).split(' ')){
    if((line+' '+word).trim().length>w){ out.push(line.trim()); line=word; }
    else line+=' '+word;
  }
  if(line.trim()) out.push(line.trim());
  return out;
}
const signColor=v=> v>NB?HAWK:(v<-NB?DOVE:NEUT);

function buildDatasets(bank, mode){
  const D=DATA[bank];
  const bars={
    type:'bar', label:D.label, order:2, _bank:bank, _isBar:true,
    data:D.dates.map((d,i)=>({x:d,y:D.bar[i]})),
    backgroundColor: mode==='ALL'
        ? BANKC[bank]
        : D.bar.map(signColor),
    borderWidth:0, borderRadius:2,
    categoryPercentage:0.9, barPercentage:0.9
  };
  const trend={
    type:'line', label:D.label+' 추세', order:1, _bank:bank,
    data:D.dates.map((d,i)=>({x:d,y:D.trend[i]})),
    borderColor: mode==='ALL' ? BANKC[bank] : '#5a5f66',
    borderWidth:1.2, borderDash:[5,4],
    pointRadius:0, pointHitRadius:0, tension:0.3, fill:false
  };
  return [bars, trend];
}

let chart=null;
function render(mode){
  const show = mode==='ALL' ? banks : [mode];
  const ds = show.flatMap(b=>buildDatasets(b, mode));
  document.getElementById('ptitle').textContent =
    'Hawk-Dove Stance — ' + (mode==='ALL' ? '미국 · 일본' : DATA[mode].label);
  const cfg={
    data:{datasets:ds},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{mode:'nearest', intersect:true},
      scales:{
        x:{type:'category', stacked:false,
           labels:[...new Set(show.flatMap(b=>DATA[b].dates))].sort(),
           ticks:{color:'#5a5f66', maxTicksLimit:14, maxRotation:0, font:{family:'DM Sans',size:11}},
           grid:{display:false}},
        y:{min:-2.2, max:2.2,
           ticks:{color:'#5a5f66', stepSize:1, font:{family:'DM Sans',size:11},
                  callback:v=>v>0?('+'+v+(v===2?' 매파':'')):(v<0?(v+(v===-2?' 완화':'')):'0 중립')},
           grid:{color:ctx=>ctx.tick.value===0?'rgba(0,0,0,.25)':'rgba(0,0,0,.07)',
                 lineWidth:ctx=>ctx.tick.value===0?1.2:1}}
      },
      plugins:{
        legend:{display:mode==='ALL', labels:{color:'#1a1c1f', usePointStyle:true,
                filter:i=>!i.text.includes('추세')}},
        tooltip:{
          filter:item=>item.dataset._isBar,
          backgroundColor:'#ffffff', borderColor:'#e8e8e6', borderWidth:1,
          titleColor:'#6e1f1f', bodyColor:'#1a1c1f', titleFont:{weight:'600'},
          padding:10, displayColors:false,
          callbacks:{
            title:items=>items.length?('📅 '+items[0].raw.x):'',
            label:item=>{
              const evs=DATA[item.dataset._bank].events[item.raw.x]||[];
              const lines=[];
              evs.forEach((e,i)=>{
                if(i>0) lines.push('');
                lines.push('👤 '+e.sp+'  (stance '+(e.st>0?'+':'')+e.st+')');
                wrap(e.rs,54).forEach(l=>lines.push(l));
              });
              return lines;
            }
          }
        }
      }
    }
  };
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('cv'), cfg);
}
render(banks.includes('FED')?'FED':banks[0]);
sel.value = banks.includes('FED')?'FED':banks[0];
</script>
