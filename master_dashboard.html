<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Macro Dashboard</title>
<style>
body { margin:0; background:#f7f6f3; color:#1a1c1f; font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif; }
.header { padding:16px 24px 8px 24px; }
h1 { margin:0 0 12px 0; font-size:22px; color:#1a1c1f; font-family:Georgia,serif; }
.tabs { display:flex; gap:8px; margin-bottom:12px; }
.tab-btn { background:#fff; color:#1a1c1f; border:1px solid #e8e8e6; border-radius:8px;
            padding:10px 16px; cursor:pointer; font-size:14px; font-weight:600; }
.tab-btn:hover { background:#f4f3f1; }
.tab-btn.active { background:#6e1f1f; color:white; border-color:#6e1f1f; }
.viewer { width:100%; height:calc(100vh - 100px); }
.tab-frame { width:100%; height:100%; border:none; display:none; }
.tab-frame.active { display:block; }
.missing { padding:40px; color:#c0392b; font-size:15px; display:none; }
.missing.active { display:block; }
</style>
</head>
<body>

<div class="header">
    <h1>Macro Dashboard</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('econ', this)">경제지표</button>
        <button class="tab-btn" onclick="showTab('research', this)">증권사 자료</button>
        <button class="tab-btn" onclick="showTab('pca', this)">PCA</button>
        <button class="tab-btn" onclick="showTab('caimap', this)">CAI · MAP</button>
        <button class="tab-btn" onclick="showTab('equity', this)">Equity Factors</button>
        <button class="tab-btn" onclick="showTab('consensus', this)">Consensus</button>
        <button class="tab-btn" onclick="showTab('policy', this)">Policy Tone</button>
    </div>
</div>

<div class="viewer">
    <iframe id="econ" class="tab-frame active" src="경제지표가져오기/dashboard.html"></iframe>
    <iframe id="research" class="tab-frame" data-src="https://ibreport-dashboard.vercel.app"></iframe>
    <iframe id="pca" class="tab-frame" data-src="PCA/pca_dashboard.html"></iframe>
    <iframe id="caimap" class="tab-frame" data-src="gs_api/cai_map_dashboard.html"></iframe>
    <iframe id="equity" class="tab-frame" data-src="gs_api/pairbaskets_dashboard.html"></iframe>
    <iframe id="consensus" class="tab-frame" data-src="Consensus Builder/Consensus.html"></iframe>
    <iframe id="policy" class="tab-frame" data-src="policytone/hawkdove_dashboard.html"></iframe>
</div>

<script>
function showTab(id, btn) {
    document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const frame = document.getElementById(id);
    if (!frame.src && frame.dataset.src) frame.src = frame.dataset.src;  // 첫 클릭 시 로드
    frame.classList.add('active');
    btn.classList.add('active');
}
</script>

</body>
</html>
