ttlenecks) with no clear pessimism, supporting neutral growth positioning.", "st": 0.4}], "2024-10-03": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "Noguchi presents Japan as transitioning away from deflation with improving growth and shifting inflation drivers (import→wages), justifying March 2024 policy normalization, but his own July hike dissent and caution on underlying inflation anchoring suggest moderate rather than strong hawkishness—policy path remains gradualist and data-dependent.", "st": 0.25}], "2024-09-24": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals a hawkish-moderate stance: inflation is trending toward the 2% target with rising underlying inflation driven by wage pass-through (inflation+1); labor market remains tight and corporate profits strong supporting continued wage growth (growth_labor+1); the July rate hike and commitment to further raises if outlook materializes, combined with explicit discussion of moving toward neutral real rates, indicates sustained tightening bias (policy_path+1.5), though he emphasizes data-dependency and flexibility given external uncertainties, preventing a more extreme hawkish score.", "st": 1.25}], "2024-09-12": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Tamura signals hawkish lean with explicit concern about upside inflation risks (labor shortages, wage pass-through, import prices), projects CPI around 2% sustainably, and advocates raising short-term rates gradually toward ~1% neutral rate by H2 FY2026 to contain price pressures; growth and labor conditions are firm (moderate recovery, wage growth, tight labor market) but not overheating; confidence is high due to clear, direct monetary policy discussion with consistent tone on normalization path, though some modulation around market volatility concerns.", "st": 1.4}], "2024-09-11": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "멤버는 물가 상방리스크(import prices turn positive, wage-price spiral risk)를 명시적으로 강조하며 7월 기준금리 인상결정(0%→0.25%)을 정당화했으나, 실질금리 여전히 마이너스·완화적 조건 지속 언급으로 긴축 강도는 제한적이고, 성장·고용은 적정 수준 평가(virtuous cycle)하여 정책 정상화의 초기 단계임을 드러냄.", "st": 1.15}], "2024-09-05": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "TAKATA signals cautious hawkishness: explicitly acknowledges upside price risks and judged July rate hike appropriate to adjust accommodation toward sustainability, yet emphasizes patience due to natural rate uncertainty and global volatility—positioning for eventual further tightening while monitoring lag effects of US/EU policy and yen movements, not imminent easing.", "st": 0.9}], "2024-08-28": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor HIMINO presents a baseline scenario of moderate growth slightly above potential (1%), gradual inflation deceleration to 2% target in FY2025-26, and an emerging but fragile wage-price virtuous cycle, while acknowledging risks of both persistent above-target inflation and deflationary undershooting; on policy, the BOJ signals ongoing unwinding of unconventional measures and short-term rate adjustment without committing to tightening pace, reflecting neither hawkish urgency nor accommodative ease—a cautiously normalizing stance.", "st": 0.25}], "2024-08-07": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "UCHIDA signals cautious normalization: inflation concerns remain moderate (2.6% CPI, wage-driven price pass-through evident) rather than acute, growth is above potential but with pockets of weakness, and policy is gradually tightening (rate hike + JGB reduction plan) yet maintains highly accommodative real rates—a weak hawkish stance consistent with gradual exit from extraordinary easing.", "st": 0.65}], "2024-06-06": [{"sp": "NAKAMURA Toyoaki, Member of the Policy Board", "rs": "Nakamura strikes a cautious middle ground: acknowledging persistent inflation (25 months above 2%) and recent wage strength (5.2% Shunto) but expressing skepticism about wage-to-price pass-through robustness and deep concern about household spending weakness driven by structural headwinds (aging, social burden, disposable income lag), which hints at limited pricing power ahead; his explicit support for maintaining current accommodative policy despite inflation suggests gradualism over tightening, though uncertainty about SME wage spillovers and consumption sustainability prevents a fully dovish stance.", "st": -0.1}], "2024-05-29": [{"sp": "ADACHI Seiji, Member of the Policy Board", "rs": "Adachi signals cautious hawkishness: BOJ terminated easing (March 2024) and expects inflation to potentially rise again from summer-autumn 2024 driven by sticky prices and wage pressures amid labor shortages, but emphasizes accommodation remains appropriate given moderate growth outlook; short-term inflation risks (weak yen spillover) offset by downside concerns if rate hikes occur too rapidly, yielding moderately hawkish policy stance with measured confidence.", "st": 0.9}], "2024-05-27": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor Uchida signals structural exit from deflation via tight labor markets and normalized price-setting behavior, while emphasizing QQE/YCC's past accommodative role and recent global inflation's role in breaking deflationary norms; tone is moderately hawkish on inflation persistence and labor tightness, with cautious optimism on policy normalization ahead rather than immediate tightening, suggesting a gradual shift away from accommodation.", "st": 0.75}, {"sp": "UEDA Kazuo, Governor", "rs": "Ueda signals exit from ultra-easy policy (terminating YCC, QQE, asset purchases) in response to improved inflation, indicating modest hawkish tilt; however, emphasizes 'cautious' normalization and challenges ahead, avoiding aggressive rate-hike signals. Inflation axis (+1) reflects confidence inflation is moving away from zero toward 2% target, while policy_path (+1) reflects decisive easing termination but measured tone; growth_labor (0) appears neutral with no explicit concern about overheating or labor market weakness mentioned.", "st": 0.8}], "2024-05-08": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals clear exit from 11-year easing with rate lift from -0.1% to 0-0.1%, YCC termination, and asset purchase reductions, reflecting confidence that 2% inflation target is within sight via solidifying wage-price linkages; growth and labor market remain firm with tight conditions supporting further wage gains, though upside risks to inflation acknowledged if wage-price spiral accelerates beyond baseline.", "st": 1.4}], "2024-04-19": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals moderate policy normalization (ending YCC, raising short-term rate to 0-0.1%) based on improved inflation outlook and sustained wage growth, yet explicitly maintains an 'accommodative' stance and commits to gradual, cautious further steps—reflecting confidence in disinflation progress without aggressive tightening.", "st": 1.0}], "2024-04-18": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "Noguchi signals moderate hawkishness on inflation (services prices rising, wages-price virtuous cycle forming) and policy normalization (March decisions to exit QQE, end negative rates, raise policy rates gradually), but emphasizes the pace will be 'far slower' than peers and remaining structural deflationary headwinds (zero norm, low r*), indicating cautious tightening rather than aggressive restriction.", "st": 0.9}], "2024-03-27": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Tamura signals a hawkish pivot with the March 2024 framework shift—the Bank has exited negative rates and yield curve control, marking explicit normalization. Inflation concerns remain elevated (core CPI ~3%) though declining, while wage-price dynamics are strengthening via labor shortages and broader firm price-pass-through behavior. Growth projections are solid (1.8-1.2-1.0%) but consumption shows nascent weakness despite solid labor market, warranting cautious optimism. The policy stance is clearly tightening (rate hike, YCC removal, ETF/REIT purchases halted), yet framed as deliberate and data-dependent normalization rather than aggressive hiking.", "st": 1.15}], "2024-03-07": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "BOJ board member signals cautiously optimistic stance: moderate economic recovery underway with wages rising toward 2% target, inflation decelerating from peaks but core CPI elevated (~3.5%), labor market tight and supporting spending; monetary policy remains accommodative (YCC, asset purchases) with no imminent tightening signals, but acknowledges inflation expectations may rise gradually—mixed tone leans slightly hawkish on inflation risks and growth resilience, dovish on policy path.", "st": 0.1}], "2024-03-05": [{"sp": "UEDA Kazuo, Governor", "rs": "이 연설은 중앙은행 디지털화폐(CBDC) 기술 및 정책 기반시설에 관한 기술적 설명에 중점을 두고 있으며, 통화정책의 방향성(금리, 긴축/완화, 인플레이션 관리)에 대한 직접적인 신호나 입장을 전혀 담고 있지 않습니다.", "st": 0.0}], "2024-02-29": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "TAKATA signals transition from pure easing toward policy normalization (exit framework, terminate YCC/negative rates) while confirming inflation target progress and observing moderating overseas risks; inflation concerns present but manageable, growth solid but downside risks from abroad warrant caution, policy path shows clear tilt toward tightening steps despite continued accommodation.", "st": -0.1}], "2024-02-08": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor signals gradual normalization pathway conditional on wage-price virtuous cycle solidifying toward 2% sustainability; acknowledges recent favorable macro backdrop (strong profits, acute labor shortages) supporting inflation expectations, but maintains accommodative stance given Japan's unique inflation dynamics and still-anchoring expectations—mixed signals reflect cautious hawkishness tempered by persistent uncertainties and commitment to avoid discontinuity.", "st": 0.25}], "2025-12-25": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals a gradual hawkish normalization: the December rate hike reflects confidence in sustained inflation trajectory toward 2% target via wage-price mechanism, tight labor markets, and strong corporate profits, with forward guidance suggesting further rate increases if economic baseline holds—moderately elevated inflation concerns and active tightening bias, though framed cautiously around data dependency and baseline scenario realization.", "st": 1.4}], "2025-12-01": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda signals gradual monetary tightening with explicit commitment to 'continue to raise the policy interest rate' as economic activity and prices improve, while acknowledging real rates remain well below neutral; inflation running ~3% with food-driven pressures but expected to moderate below 2% mid-2026 before normalizing toward 2% target; labor market remains tight with record wage growth (5%+) and strong wage-negotiation momentum for 2026, supporting underlying inflation expectations; modest near-term growth outlook but baseline scenario gaining probability; tone is hawkish-gradualist rather than restrictive or accommodative, emphasizing calibration rather than urgency or patience.", "st": 0.9}], "2025-11-27": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "BOJ official signals cautious hawkish lean with gradual rate hikes justified (0.5% as of Jan 2025) and balance sheet normalization underway; inflation concern elevated due to persistent CPI above 2% target and potential chain-reaction price hikes in food; labor market steady with wage growth expectations (3%+ nominal); downside risk acknowledgment on tariffs tempers hawkishness, keeping policy_path moderate rather than strongly restrictive.", "st": 0.9}], "2025-11-10": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "Nakagawa signals a gradual normalization path with maintained accommodation: inflation expectations have risen moderately toward 2% target with wage-price interactions strengthening; the BoJ is already conducting policy at 0.5% and plans further rate increases if outlook holds; balance sheet normalization (JGB/ETF reduction) signals long-term tightening intent, yet current stance remains accommodative and data-dependent given substantial trade-policy uncertainties and wage-setting behavior risks in Japan.", "st": 0.82}], "2025-10-20": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "매파 신호: 인플레 안정 목표 거의 달성, 임금-물가 악순환 징후(국내 요인 중심), 임금인상 지속(최저임금 6.3%), 기대인플레 상승 추세. 다만 정책 경로는 현 시점 명확한 인상 신호 없이 모니터링 중심으로 표현되어 중립에 가까움.", "st": 0.9}], "2025-10-16": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "Strong hawkish signals with explicit concern about upside inflation risks, firms' proactive pricing behavior, and repeated emphasis that current 0.5% rate remains accommodative; speaker voted for 0.75% hike and warned against falling behind the curve, though acknowledging downside risks from U.S. tariffs warrant cautious approach—net result leans clearly toward tightening path with elevated but not extreme inflation concern and moderate growth outlook.", "st": 1.3}], "2025-10-03": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda signals cautious policy normalization: acknowledging upside inflation risks (food, wages, labor shortage effects) and modest growth headwinds (tariffs, overseas slowdown) while explicitly maintaining current 0.5% rates and committing to gradual rate increases conditional on baseline scenario confirmation; mixed but moderately hawkish stance balancing accommodation against emerging inflation pressures and medium-term normalization needs.", "st": 0.65}], "2025-09-29": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "Noguchi signals a hawkish stance: the BoJ has normalized policy with rate hikes (July 2024, January 2025) based on progress toward 2% inflation target, labor markets have tightened significantly with wage growth at post-bubble highs, and he explicitly states upside risks to prices and activity now outweigh downside risks, necessitating careful assessment for further tightening—yet he moderates by emphasizing gradual balance sheet adjustment and global tariff downside risks, suggesting measured rather than aggressive future moves.", "st": 1.15}], "2025-09-02": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor emphasizes underlying inflation gradually rising toward 2% target despite elevated headline inflation from temporary food/energy shocks, acknowledges acute labor shortages supporting upward price pressure, yet expresses significant uncertainty about U.S. tariff transmission channels and offsetting downside risks to growth—yielding cautiously elevated inflation concerns with muted growth/labor assessment and neutral policy stance reflecting wait-and-see approach.", "st": 0.3}], "2025-08-28": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "Speech emphasizes moderate economic recovery with resilient labor market (steady employment gains, strong wage growth) and elevated inflation (CPI 2.7%, rising core measures due to food/wage pass-through, medium-term expectations rising), but projects temporary weakness from tariff headwinds followed by recovery—tone is cautiously constructive rather than hawkish on policy tightening; no explicit rate-hike signals, suggesting measured/patient stance amid near-term growth concerns tempering inflation concerns.", "st": 0.17}], "2025-08-23": [{"sp": "UEDA Kazuo, Governor", "rs": "Ueda acknowledges significant wage pressures and tight labor markets stemming from demographics and post-COVID inflation, recognizing upward wage momentum (5.25% 34-year high), but frames this primarily as structural/supply-side evolution rather than demanding immediate policy tightening; no explicit hawkish or dovish monetary policy signals—only commitment to monitor and assess supply conditions, making the stance cautiously neutral with modest inflation concern and acknowledgment of growth/labor tightness, yet absent clear policy direction.", "st": 0.35}], "2025-07-23": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor signals moderate growth outlook tempered by trade policy risks, acknowledges persistent labor tightness supporting 5.25% wage growth and underlying inflation, but emphasizes downside risks and absence of immediate tightening—reflecting cautious, data-dependent stance rather than hawkish urgency despite elevated food prices.", "st": 0.15}], "2025-07-03": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "Takata signals moderate hawkishness: Japan's inflation expectations and wage-driven domestic price pressures are solidifying (homemade inflation), corporate profits and wage gains remain strong despite tariff headwinds, and he advocates continuing gear-shift toward normalization—but urges flexibility and a 'wait-and-see pause' rather than aggressive near-term hikes, given U.S. tariff uncertainty and potential Fed rate cuts that could constrain BoJ policy space.", "st": 0.9}], "2025-06-25": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "매파적 신호가 지배적: 인플레 목표 달성 임박, 상방 리스크 확대, 임금·물가 설정 행태 구조적 변화, 실질금리 저평가 상황에서 정책금리 인상 시사. 다만 미국 관세의 하방 압력 언급과 경제 둔화 전망으로 성장·노동 평가는 중립에 가까우며, 불확실성 속에서도 '시기적절하게 행동할 수 있다'는 표현으로 정책 정상화 신호는 강하지만 절대적이지는 않음.", "st": 1.05}], "2025-06-07": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "연설은 중앙은행의 통화정책 외 업무 운영(지폐발행, 정부은행 기능, 은행권 관리)에 집중하며, 인플레·성장·통화정책 방향에 대한 명시적 입장을 거의 제시하지 않음. 금리 인상 언급(0.5% 현황)은 과거사실 보도에 가까우며 향후 정책 경로나 물가·고용 평가가 부재해 통화정책 스탠스 판단 근거 매우 빈약.", "st": 0.0}], "2025-06-03": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda acknowledges tariff headwinds pushing growth/employment downward, yet maintains underlying inflation is on track with moderate wage-price interaction intact; past rate hikes (July 2024, January 2025) signal past tightening complete, and current stance is cautious pause rather than further hikes or cuts, balancing inflation vigilance against growth concerns in high-uncertainty environment.", "st": 0.05}], "2025-05-27": [{"sp": "UEDA Kazuo, Governor", "rs": "매파 신호(높은 인플레, 긴축)와 완화 신호(하방 리스크, 완화 유지)가 혼재되어 있으나, 기저 인플레가 여전히 2% 목표 이하이고 하방 리스크가 우세하며 '완화 정도 조정'이라는 유연한 표현으로 완화 기조 지속 의도가 더 강함. 인플레는 공급충격 영향으로 높아졌으나 기저는 여전히 목표 미달이므로 중립 근처, 성장·고용은 '견고한 노동시장'과 '하방 리스크'가 상쇄되어 중립, 정책 경로는 '완화 유지 + 필요시 조정'으로 완화 신호로 해석.", "st": -0.35}], "2025-05-22": [{"sp": "NOGUCHI Asahi, Member of the Policy Board", "rs": "NOGUCHI takes a data-dependent, gradualist stance: rates have risen (Mar 2024 exit, Jul+Jan hikes) but emphasizes slowness and flexibility; inflation is above 2% but mostly from temporary import/supply shocks ('first force'), while underlying wage-driven inflation ('second force') is gaining but 'not yet sufficient'—suggesting measured further tightening rather than pause, with openness to both upside risks (wage-price spiral) and downside (external tariff shock to growth); tone is balanced between hawkish normalization and dovish caution on premature tightening.", "st": 0.5}], "2025-05-16": [{"sp": "NAKAMURA Toyoaki, Member of the Policy Board", "rs": "Nakamura signals cautious optimism on disinflation (CPI moderating from H2 2025) but warns of tariff-driven downside risks to growth and labor; acknowledges improved corporate profitability supporting wage momentum yet emphasizes overseas headwinds and household thriftiness, with accommodative stance implying no near-term tightening despite lingering inflation above 3 percent.", "st": -0.15}], "2025-04-17": [{"sp": "NAKAGAWA Junko, Member of the Policy Board", "rs": "매파 신호: 인플레 3.0-3.5% 지속, 임금상승률 5.42% 높은 수준, 기업의 가격인상 행동 확산, 기대인플레 상승세, 고용시장 타이트 → inflation +1.5; 고용·임금 개선, 경기 완만 회복세 → growth_labor +1.0; 1월 기준금리 인상(0.25→0.5%), 완화도 조정 결정했으나 3월 현상유지, 하방리스크(무역정책·소비심리) 강조로 추가인상 신중 → policy_path +1.0 (강한 매파보다는 약함); 고금리 환경 지속 시사하되 불확실성 강조로 명확성 제약.", "st": 1.15}], "2025-03-05": [{"sp": "UCHIDA Shinichi, Deputy Governor", "rs": "Deputy Governor Uchida signals gradual hawkish normalization—raising rates to 0.5% while maintaining accommodation, emphasizing that underlying inflation (price-wage spiral) remains below 2% target, thus justifying continued but measured tightening. Growth faces labor constraints but remains above potential; no major recession fears. Tone is methodical normalization rather than aggressive tightening or urgent easing.", "st": 0.75}, {"sp": "UEDA Kazuo, Governor", "rs": "연설은 국제통화체계와 자본흐름의 거시금융 안정성에 관한 역사적·제도적 논의에 집중하며, 현재의 구체적인 통화정책 스탠스(인상/인하 신호), 인플레이션 우려도, 성장·고용 평가를 직접 제시하지 않음. 통화정책 운영의 방향성이 명확하지 않아 정책경로 판단이 불가능하고, 지정학적 위험과 자본흐름 변동성이 주제일 뿐 인플레이션 또는 고용시장 상태에 대한 중앙은행총재의 입장이 드러나지 않음.", "st": 0.0}], "2025-02-19": [{"sp": "TAKATA Hajime, Member of the Policy Board", "rs": "TAKATA signals hawkish stance via explicit rate hike justification (0.5% in Jan 2025) and emphasis on 'further adjustment' if positive corporate behavior confirmed, but tempers with real rates still 'significantly negative' and 'accommodative conditions maintained'; inflation moving toward 2% target with upside risks acknowledged (U.S. spillover, domestic wage-price spiral); growth-labor rated +1 due to solid wage gains (+5% first time in 33 years) and active investment, though no overheating language; confidence high given direct policy conduct discussion and clear three-phase inflation narrative, though some ambiguity on pace of future tightening.", "st": 1.4}], "2025-02-06": [{"sp": "TAMURA Naoki, Member of the Policy Board", "rs": "강한 매파 신호: 물가상방 위험 명확히 언급, 2%목표 달성 임박 판단, 상반기 내 최소 1% 이상 인상 필요, 공급제약·임금상승으로 인플레 압력 지속 강조, 다만 '점진적 인상'·'신중한 평가' 등으로 급격한 긴축은 회피 의지 표현.", "st": 1.4}], "2025-01-30": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor Himino signals modest policy tightening (Jan 2025 rate hike from 0.25% to 0.5%) while emphasizing real rates remain deeply negative and accommodation continues; growth outlook supportive but inflation narrative focuses on stability rather than upside urgency; framework is gradualist normalization contingent on economic realization, not hawkish urgency on inflation risks.", "st": 0.5}], "2025-01-14": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor acknowledges inflation target becoming sustainable with positive wage-price dynamics post-COVID, but emphasizes deflationary headwinds largely passed and real rates already accommodative; no direct tightening signal, rather cautious optimism on normalization path—moderately dovish lean tempered by recognition that negative real rates should not persist indefinitely once structural issues resolve.", "st": -0.1}], "2026-05-27": [{"sp": "UEDA Kazuo, Governor", "rs": "Governor Ueda's speech is primarily historical and analytical rather than forward-looking on policy stance; he examines past supply shocks and their transmission mechanisms but deliberately avoids prescribing current policy direction, noting Japan has shifted away from deflation toward 1.5-2+% expectations (modest positive upward movement suggesting slight hawkish lean on inflation assessment) while maintaining agnostic tone on appropriate policy response, resulting in near-neutral readings across all three axes with low confidence due to lack of direct policy signaling.", "st": 0.15}], "2026-05-16": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "This speech focuses entirely on future monetary system architecture, digital currencies, and payment infrastructure philosophy with no discussion of current inflation, labor market conditions, or near-term policy stance; thus all axes score at neutral zero, with very low confidence due to absence of conventional monetary policy signaling.", "st": 0.0}], "2026-03-03": [{"sp": "UEDA Kazuo, Governor", "rs": "연설은 통화정책 스탠스를 직접 다루지 않으며, 금융 기술·결제 시스템·CBDC 개발에만 집중하여 물가·성장·금리경로에 대한 명시적 신호가 전무하다.", "st": 0.0}], "2026-03-02": [{"sp": "HIMINO Ryozo, Deputy Governor", "rs": "Deputy Governor Himino signals cauti iscussion of inflation risks, labor market conditions, or future rate path, making confident assessment of policy inclination impossible.", "st": 0.0}], "2025-06-26": [{"sp": "Governor Michael S. Barr", "rs": "Barr acknowledges disinflation progress toward 2% but signals upward tariff risks and near-term inflation persistence; notes current sound economy with low unemployment yet warns tariffs may slow growth and hurt low-income workers; adopts a patient 'wait and see' stance on monetary policy given uncertainty, avoiding explicit hawkish tightening signals while recognizing inflation concerns—mixed and cautious rather than clearly directional, with primary focus on community development rather than monetary policy specifics.", "st": -0.2}], "2025-06-24": [{"sp": "Governor Michael S. Barr", "rs": "Governor Barr signals emerging upside inflation risks from tariffs and potential second-round effects while acknowledging economic slowdown risks, but adopts a cautious wait-and-see posture rather than committing to tightening or easing—moderately hawkish on inflation concerns yet policy-neutral pending clarity on tariff impacts.", "st": 0.3}], "2025-06-23": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler's remarks focus on the procedural aspects of the 2025 monetary policy framework review and soliciting public input, with minimal substantive signals on inflation concerns, labor market assessment, or policy direction; the speech is deliberately neutral and listening-oriented rather than signaling hawkish or dovish policy stance.", "st": 0.0}, {"sp": "Vice Chair for Supervision Michelle W. Bowman", "rs": "VP Bowman signals readiness to cut rates soon due to inflation progress (toward 2%), softening growth/labor market dynamics, and shifted balance of risks toward employment downside; while acknowledging upside tariff risks, she emphasizes contained inflation trajectory and labor market fragility, tilting the policy stance accommodative despite maintaining surveillance on risks.", "st": -1.1}, {"sp": "Governor Christopher J. Waller", "rs": "연설은 중앙은행 연구 저널 회의 개회사로서 과거 팬데믹 대응에 대한 학술 평가를 다루나, 현재의 인플레이션·성장·정책 방향에 대한 직접적인 스탠스나 통화정책 신호가 전혀 없으며 정책 의도를 드러내는 매파·완화 언어가 부재함.", "st": 0.0}], "2025-06-05": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals hawkish caution on inflation (tariff pass-through confirmed, expectations rising, goods deflation reversed) justifying policy hold, while acknowledging labor market resilience with emerging softness and moderate growth slowdown—positioning inflation as the binding constraint.", "st": 0.85}], "2025-06-04": [{"sp": "Governor Lisa D. Cook", "rs": "연설은 순수하게 청취 행사 개회사이며 통화정책 스탠스나 방향성에 대한 직접적 언급이 전혀 없고, 정책 신호(매파/완화)를 전달하지 않으며, 틀 검토의 절차적 안내만 제공하므로 정책 판단 근거가 극히 빈약함.", "st": 0.0}], "2025-06-03": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals concern about inflation (above 2% target, trade-policy upside risks, rising one-year expectations) and labor market moderation (payroll gains declining, potential hiring plan changes), while maintaining a neutral policy stance ('unchanged' rates, 'well positioned') pending further data—balanced vigilance without committing to either tightening or easing given dual-mandate risks.", "st": 0.4}], "2025-06-02": [{"sp": "Chair Jerome H. Powell", "rs": "This is a ceremonial speech commemorating the 75th anniversary of the IF division; it contains no discussion of current monetary policy stance, inflation outlook, growth assessment, or policy path, making it substantively unrelated to active policy signaling.", "st": 0.0}], "2025-06-01": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals upside inflation risks from tariffs (expecting 3-5% peak depending on scenario) but frames as temporary/transitory given anchored expectations and no persistent labor/supply shocks like 2021-22; meanwhile expects modest growth slowdown and rising unemployment from tariff drag, with policy rate already restrictive (>4%) and balance sheet shrunk—neither hawkish tightening nor easing signaled, but acknowledging near-term inflation threat requires vigilance.", "st": 0.35}], "2025-05-29": [{"sp": "Governor Adriana D. Kugler", "rs": "연설은 통화정책 방향·기조를 직접 언급하지 않고 거시금융 연구 의제(CRE, 무역 노출, 안전자산 역할 변화)에 집중하여 인플레·성장·정책경로에 대한 명확한 신호를 제공하지 않음.", "st": 0.0}], "2025-05-23": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook's speech focuses primarily on financial stability monitoring and macroeconomic-finance integration rather than direct monetary policy stance; while noting elevated valuations and April volatility concerns, she emphasizes resilience and moderate household/business risks without signaling imminent rate changes, tilting slightly toward growth concerns given tariff-related economic slowdown risks mentioned, but lacking clear inflation or policy-path signals typical of communications aimed at market guidance.", "st": -0.2}], "2025-05-19": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "연설은 순전히 중앙은행 유동성 공급 인프라(할인창, 당일신용)의 기술적·운영상 특성을 비교분석하는 내용으로, 통화정책 스탠스(긴축/완화)나 인플레이션·성장·고용 전망에 대한 직접적 신호가 전혀 없으며, 금리 경로나 정책 방향성에 대한 언급도 부재하여 통화정책 입장 평가 불가능.", "st": 0.0}], "2025-05-15": [{"sp": "Governor Michael S. Barr", "rs": "Governor Barr frames the economy as fundamentally sound with growth and disinflation on track, but expresses caution about trade-policy uncertainty risks to supply chains and small businesses, creating a mixed tone that combines soft growth/labor optimism with modest inflation concerns and policy restraint rather than clear easing signals.", "st": 0.1}, {"sp": "Chair Jerome H. Powell", "rs": "Powell's May 2025 speech focuses on the Fed's strategic framework review process rather than current monetary policy stance; he reviews past decisions (2020 framework, 2022 inflation response) and announces deliberative intentions without signaling immediate policy direction—the speech is prospective and backward-looking on methodology rather than forward-guidance on rates, inflation concerns, or growth trajectory.", "st": 0.0}], "2025-05-14": [{"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson signals vigilant stance on inflation (tariffs threaten disinflation progress, +1), acknowledges balanced but cooling labor market (0), and maintains a hold with modest hawkish bias by describing policy as 'moderately restrictive' and emphasizing readiness to respond to upside inflation risks, while carefully hedging against growth downside—a cautious, risk-balanced approach rather than clear easing or tightening.", "st": 0.55}, {"sp": "Governor Christopher J. Waller", "rs": "이 연설은 중앙은행의 경제 연구의 역할과 역사에 관한 학술적 논의일 뿐, 현재의 통화정책 스탠스나 경제 상황에 대한 직접적인 평가를 전혀 다루지 않습니다. 인플레이션, 성장, 고용, 정책 방향성에 대한 명확한 신호가 없어 중립 평가입니다.", "st": 0.0}], "2025-05-12": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals hawkish concern on inflation (tariffs as negative supply shock, upside risks, slowed disinflation, elevated near-term expectations) while acknowledging growth headwinds (front-loading effects, business investment delays, uncertainty) and stable but softening labor market (declining JOLTS, rising layoff mentions); she maintains restrictive stance and guards against premature easing, though noting potential opposite directional movement between inflation and employment ahead.", "st": 0.85}], "2025-05-09": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook emphasizes productivity as a moderating force on inflation and supports strong growth, but warns that trade policy uncertainty poses near-term deflationary/disinflationary risks to potential output, which could paradoxically require higher rates longer if productivity slows—a mixed hawkish-dovish tone centered on data-dependent productivity dynamics rather than explicit policy bias.", "st": 0.5}, {"sp": "Governor Christopher J. Waller", "rs": "This speech is primarily a historical and theoretical exposition on central bank design, credibility, and independence with no direct assessment of current inflation risks, labor market conditions, or forward monetary policy stance; it contains no hawkish or dovish signals regarding rate adjustments, inflation outlook, or economic conditions at the May 2025 timeframe.", "st": 0.0}, {"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler's speech is primarily pedagogical on measuring maximum employment rather than a statement of current monetary policy stance; while she notes the labor market is 'stable' and 'close to maximum employment' at 4.2% unemployment, she explicitly avoids endorsing a single model or signaling rate changes, emphasizing methodological complexity and real-time estimation uncertainty rather than communicating hawkish or dovish policy direction.", "st": 0.0}, {"sp": "Governor Michael S. Barr", "rs": "연설은 AI 장기 영향을 중심으로 하되, 통화정책과 관련해 단기 우려(관세→인플레/고용 악화의 딜레마)만 언급하나, 현재 정책 입장은 모호함: 강한 경제 기초를 인정하면서도 불확실성 속 조정 여력 강조(중립-약한 매파)하므로 각 축 약간의 상향 신호만 포함.", "st": 0.15}], "2025-04-23": [{"sp": "Governor Christopher J. Waller", "rs": "연설은 'Fed Listens' 이벤트의 목적과 공공과의 소통 중요성에 집중하며, 인플레, 성장, 통화정책 방향에 대한 직접적 언급이나 명확한 스탠스 신호가 거의 없는 순전한 행정 및 대중 참여 강조 연설임.", "st": 0.0}], "2025-04-22": [{"sp": "Governor Adriana D. Kugler", "rs": "Governor Kugler signals cautious restraint amid persistent above-target inflation and upside tariff risks while labor market remains stable; she supports maintaining current rates as long as inflation risks persist, indicating slight hawkish lean on policy path, but her emphasis on transmission mechanics and acknowledged uncertainty prevents a stronger hawkish posture.", "st": 0.55}, {"sp": "Vice Chair Philip N. Jefferson", "rs": "Jefferson praises the post-GFC expansion (2009-2019) for combining strong employment gains with low inflation, emphasizing dual-mandate achievement; however, the speech is primarily about economic mobility rather than forward-looking monetary policy, lacks explicit current policy guidance, and contains no restrictive or easing signals about future rate paths, making it a retrospective analysis rather than a policy stance communication.", "st": -0.1}], "2025-04-16": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals concern about tariff-driven inflation upside risks and acknowledges dual-mandate tension, but maintains a patient, data-dependent stance with no near-term policy moves—moderately hawkish tilt on inflation expectations while growth is slowing and labor market is balanced, not a source of inflationary pressure.", "st": 0.55}], "2025-04-14": [{"sp": "Governor Christopher J. Waller", "rs": "Waller signals elevated near-term inflation risk (tariffs pushing 1.5-2 pp increase) but frames it as temporary and manageable if expectations stay anchored; simultaneously warns of significant growth slowdown and rising unemployment (5% in large tariff scenario), tilting toward future rate cuts if recession threat materializes—a mixed but growth-concerned stance with policy loosening biased via 'bad news' rate cut logic, offsetting persistent inflation concerns.", "st": -0.0}], "2025-04-07": [{"sp": "Governor Adriana D. Kugler", "rs": "연설은 하버드 경제학 강의로서 인플레이션 동학과 필립스 곡선 모형에 대한 학술적 설명에 중점을 두었으며, 현재 통화정책 스탠스나 향후 정책 방향에 대한 직접적 신호가 거의 없어 판단 근거가 극히 빈약함.", "st": 0.0}], "2025-04-04": [{"sp": "Chair Jerome H. Powell", "rs": "Powell signals hawkish tilt on inflation (tariff concerns, explicit near-term inflation risks, emphasis on anchoring expectations) and cautious hold on policy path (acknowledging uncertainty, waiting for clarity, not committing to cuts), while labor market remains balanced without inflationary pressure; strong emphasis on tariff-driven upside inflation risks moderates growth outlook to neutral.", "st": 0.55}], "2025-04-03": [{"sp": "Governor Lisa D. Cook", "rs": "Governor Cook signals measured hawkishness on inflation (2.5% vs 2% target, tariff upside risks, slower disinflation) and solid labor market, but emphasizes policy has already eased from peak restrictiveness and must navigate heightened uncertainty; the tone is cautious rath const NB = 0.15;
const BANKC  = {FED:'#5DCAA5', BOJ:'#F5B43C'};   // 전체 모드 막대색(은행 구분)
const HAWK='#E8763A', DOVE='#4C8DDE', NEUT='#7a8194';

const sel = document.getElementById('country-filter');
const banks = Object.keys(DATA);
sel.innerHTML = '<option value="ALL">전체 (All)</option>' +
  banks.map(b=>`<option value="${b}">${DATA[b].label}</option>`).join('');

function wrap(s, w){
  const out=[]; let line='';
  for(const word of String(s).split(' ')){
    if((line+' '+word).trim().length>w){ out.push(line.trim()); line=word; }
    else line+=' '+word;
  }
  if(line.trim()) out.push(line.trim());
  return out;
}
const signColor=v=> v>NB?HAWK:(v<-NB?DOVE:NEUT);

function buildDatasets(bank, mode){
  const D=DATA[bank];
  const bars={
    type:'bar', label:D.label, order:2, _bank:bank, _isBar:true,
    data:D.dates.map((d,i)=>({x:d,y:D.bar[i]})),
    backgroundColor: mode==='ALL'
        ? BANKC[bank]
        : D.bar.map(signColor),
    borderWidth:0, borderRadius:2,
    categoryPercentage:0.9, barPercentage:0.9
  };
  const trend={
    type:'line', label:D.label+' 추세', order:1, _bank:bank,
    data:D.dates.map((d,i)=>({x:d,y:D.trend[i]})),
    borderColor: mode==='ALL' ? BANKC[bank] : '#e8e8e8',
    borderWidth:1.2, borderDash:[5,4],
    pointRadius:0, pointHitRadius:0, tension:0.3, fill:false
  };
  return [bars, trend];
}

let chart=null;
function render(mode){
  const show = mode==='ALL' ? banks : [mode];
  const ds = show.flatMap(b=>buildDatasets(b, mode));
  document.getElementById('ptitle').textContent =
    'Hawk-Dove Stance — ' + (mode==='ALL' ? '미국 · 일본' : DATA[mode].label);
  const cfg={
    data:{datasets:ds},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      interaction:{mode:'nearest', intersect:true},
      scales:{
        x:{type:'category', stacked:false,
           labels:[...new Set(show.flatMap(b=>DATA[b].dates))].sort(),
           ticks:{color:'#888', maxTicksLimit:14, maxRotation:0, font:{family:'DM Sans',size:11}},
           grid:{display:false}},
        y:{min:-2.2, max:2.2,
           ticks:{color:'#888', stepSize:1, font:{family:'DM Sans',size:11},
                  callback:v=>v>0?('+'+v+(v===2?' 매파':'')):(v<0?(v+(v===-2?' 완화':'')):'0 중립')},
           grid:{color:ctx=>ctx.tick.value===0?'rgba(140,150,170,0.6)':'rgba(42,49,65,0.35)',
                 lineWidth:ctx=>ctx.tick.value===0?1.2:1}}
      },
      plugins:{
        legend:{display:mode==='ALL', labels:{color:'#aaa', usePointStyle:true,
                filter:i=>!i.text.includes('추세')}},
        tooltip:{
          filter:item=>item.dataset._isBar,
          backgroundColor:'#1a212c', borderColor:'#2a3141', borderWidth:1,
          titleColor:'#7EE0BC', bodyColor:'#dfe5ee', titleFont:{weight:'600'},
          padding:10, displayColors:false,
          callbacks:{
            title:items=>items.length?('📅 '+items[0].raw.x):'',
            label:item=>{
              const evs=DATA[item.dataset._bank].events[item.raw.x]||[];
              const lines=[];
              evs.forEach((e,i)=>{
                if(i>0) lines.push('');
                lines.push('👤 '+e.sp+'  (stance '+(e.st>0?'+':'')+e.st+')');
                wrap(e.rs,54).forEach(l=>lines.push(l));
              });
              return lines;
            }
          }
        }
      }
    }
  };
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('cv'), cfg);
}
render(banks.includes('FED')?'FED':banks[0]);
sel.value = banks.includes('FED')?'FED':banks[0];
</script>
</body>
</html>
